<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビル管理士 週次過去問トレーニング</title>
<style>
:root {
  --blue-50: #D9E6FF; --blue-200: #C5D7FB; --blue-400: #7096F8;
  --blue-600: #3460FB; --blue-900: #0017C1; --blue-1200: #000060;
  --green-50: #E6F5EC; --green-200: #9BD4B5; --green-400: #51B883; --green-600: #259D63;
  --orange-50: #FFEEE2; --orange-200: #FFC199; --orange-400: #FF8D44; --orange-600: #FB5B01;
  --red-50: #FDEEEE; --red-200: #FFBBBB; --red-400: #FF7171; --red-600: #FE3939;
  --gray-50: #F2F2F2; --gray-200: #CCCCCC; --gray-400: #999999;
  --gray-536: #767676; --gray-700: #4D4D4D; --gray-900: #1A1A1A;
  --bg: #F8F8FB; --bg-card: #FFFFFF; --border: #E2E4E9;
  --text-primary: #1A1A1A; --text-secondary: #626264; --text-link: #0017C1;
  --success: #197A4B; --error: #CE0000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", "Meiryo", "Hiragino Sans", sans-serif;
  background: var(--bg); color: var(--text-primary); line-height: 1.6;
}
.app { max-width: 900px; margin: 0 auto; padding: 12px; }

/* ===== Header ===== */
.header {
  background: linear-gradient(135deg, var(--blue-900), var(--blue-600));
  color: #fff; padding: 20px 24px; border-radius: 12px; margin-bottom: 16px;
}
.header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header-period { font-size: 13px; opacity: 0.85; }
.header-stats { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
.stat-item { font-size: 12px; opacity: 0.85; }
.stat-item strong { font-size: 18px; display: block; opacity: 1; }
.progress-wrap { background: rgba(255,255,255,0.2); border-radius: 6px; height: 8px; margin-top: 12px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 6px; background: #fff; transition: width 0.4s ease; }

/* ===== Tabs ===== */
.tabs {
  display: flex; gap: 3px; margin-bottom: 16px; background: var(--bg-card);
  border-radius: 8px; padding: 4px; border: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 8px 12px; border: none; background: transparent; border-radius: 6px;
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary);
  transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
}
.tab.active { background: var(--blue-900); color: #fff; }
.tab .tab-badge {
  display: inline-block; font-size: 10px; margin-left: 4px;
  padding: 1px 5px; border-radius: 8px; background: var(--green-50); color: var(--success);
}
.tab.active .tab-badge { background: rgba(255,255,255,0.25); color: #fff; }

/* ===== Question Card ===== */
.chapter-section { margin-bottom: 20px; }
.chapter-title {
  font-size: 14px; font-weight: 700; color: var(--blue-900);
  padding: 8px 0 8px 12px; border-left: 4px solid var(--blue-600);
  margin-bottom: 12px;
}
.q-card {
  background: var(--bg-card); border-radius: 10px; padding: 20px;
  border: 1px solid var(--border); margin-bottom: 12px;
}
.q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.q-badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600; background: var(--blue-50); color: var(--blue-900);
}
.q-num { font-size: 12px; color: var(--text-secondary); }
.q-text { font-size: 14px; margin-bottom: 16px; line-height: 1.7; }
.choices { list-style: none; }
.choice-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
  border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
  font-size: 14px; line-height: 1.5;
}
.choice-item:hover { background: var(--blue-50); border-color: var(--blue-200); }
.choice-item.selected { background: var(--blue-50); border-color: var(--blue-600); }
.choice-item.correct { background: var(--green-50); border-color: var(--green-400); }
.choice-item.wrong { background: var(--red-50); border-color: var(--red-400); }
.choice-item.disabled { pointer-events: none; opacity: 0.7; }
.choice-item.disabled.correct { opacity: 1; }
.choice-radio {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--gray-200);
  flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
}
.choice-item.selected .choice-radio { border-color: var(--blue-600); }
.choice-item.selected .choice-radio::after {
  content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--blue-600);
}
.choice-item.correct .choice-radio { border-color: var(--green-600); }
.choice-item.correct .choice-radio::after {
  content: '✓'; font-size: 11px; color: var(--green-600); font-weight: 700;
}
.choice-item.wrong .choice-radio { border-color: var(--red-600); }
.choice-item.wrong .choice-radio::after {
  content: '✗'; font-size: 11px; color: var(--red-600); font-weight: 700;
}
.submit-btn {
  display: inline-block; padding: 8px 24px; border: none; border-radius: 6px;
  background: var(--blue-600); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; margin-top: 8px; transition: opacity 0.15s;
}
.submit-btn:hover { opacity: 0.85; }
.submit-btn:disabled { background: var(--gray-200); cursor: not-allowed; }
.result-banner {
  padding: 10px 14px; border-radius: 8px; margin-top: 12px;
  font-size: 13px; font-weight: 600;
}
.result-banner.correct { background: var(--green-50); color: var(--success); }
.result-banner.wrong { background: var(--red-50); color: var(--error); }
.explanation {
  margin-top: 12px; padding: 14px; background: var(--gray-50);
  border-radius: 8px; font-size: 13px; line-height: 1.7;
}
.explanation summary {
  cursor: pointer; font-weight: 600; color: var(--blue-900); font-size: 13px;
}

/* ===== Stats ===== */
.summary-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.summary-card {
  background: var(--bg-card); border-radius: 10px; padding: 16px;
  border: 1px solid var(--border); text-align: center;
}
.summary-card .label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
.summary-card .value { font-size: 24px; font-weight: 700; color: var(--blue-900); }
.summary-card .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.chart-card {
  background: var(--bg-card); border-radius: 10px; padding: 20px;
  border: 1px solid var(--border); margin-bottom: 16px;
}
.chart-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
.bar-label { width: 100px; flex-shrink: 0; text-align: right; color: var(--text-secondary); }
.bar-track { flex: 1; background: var(--gray-50); border-radius: 4px; height: 20px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; background: var(--blue-600); transition: width 0.4s; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
.bar-fill span { font-size: 10px; color: #fff; font-weight: 600; }
.bar-count { width: 60px; font-size: 11px; color: var(--text-secondary); }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--gray-900); color: #fff; padding: 10px 24px; border-radius: 8px;
  font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .app { padding: 8px; }
  .header { padding: 16px; }
  .header h1 { font-size: 17px; }
  .tab { padding: 7px 9px; font-size: 12px; }
  .q-card { padding: 14px; }
  .q-text { font-size: 13px; }
  .choice-item { padding: 10px; font-size: 13px; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .bar-label { width: 70px; font-size: 11px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header" id="header"></div>
  <div class="tabs" id="tabs"></div>
  <div id="content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== 問題データ =====
const QUESTION_BANK = {
  chapters: [
    {
      id: 1, name: "建築物衛生行政概論", shortName: "衛生行政",
      questions: [
        { id:"1-001", year:2023, text:"日本国憲法第25条に関する次の記述のうち、最も適当なものはどれか。", choices:["第25条は、国民の教育を受ける権利を規定している。","第25条は、国民の勤労の権利を規定している。","第25条は、すべて国民は健康で文化的な最低限度の生活を営む権利を有すると規定している。","第25条は、国民の財産権を規定している。","第25条は、国民の居住移転の自由を規定している。"], answer:2, explanation:"日本国憲法第25条は「すべて国民は、健康で文化的な最低限度の生活を営む権利を有する」と規定しています。これは生存権と呼ばれ、建築物衛生行政の根拠となる重要な条文です。" },
        { id:"1-013", year:2021, text:"建築物衛生法に基づく特定建築物の届出に関する次の記述のうち、最も適当なものはどれか。", choices:["届出は使用開始前に行わなければならない。","届出義務者は建築物の設計者である。","届出先は環境大臣である。","届出は使用開始後1ヶ月以内に行う。","届出は建築確認申請と同時に行う。"], answer:3, explanation:"特定建築物の届出は、使用開始後1ヶ月以内に都道府県知事（保健所設置市は市長）に届け出なければなりません。届出義務者は所有者等です。" },
        { id:"1-014", year:2020, text:"建築物衛生法における環境衛生管理基準に含まれないものは、次のうちどれか。", choices:["空気環境の調整","給水の管理","排水の管理","電気設備の管理","清掃"], answer:3, explanation:"建築物環境衛生管理基準には、空気環境の調整、給水・排水の管理、清掃、ねずみ等の防除が含まれますが、電気設備の管理は含まれていません。" },
        { id:"1-015", year:2019, text:"地域保健法に関する次の記述のうち、最も不適当なものはどれか。", choices:["保健所は、地域保健法に基づいて設置される。","保健所は、都道府県、政令指定都市、中核市等に設置される。","保健所長は、原則として医師でなければならない。","保健所は、建築物の衛生に関する事項を所管する。","保健所の設置は、市町村の任意である。"], answer:4, explanation:"保健所は都道府県、政令指定都市、中核市等に設置義務があり、任意ではありません。市町村が任意で設置するのは市町村保健センターです。" },
        { id:"1-016", year:2023, text:"学校保健安全法に関する次の記述のうち、最も不適当なものはどれか。", choices:["学校環境衛生基準は、文部科学大臣が定める。","学校薬剤師は、学校環境衛生の維持管理に関与する。","教室の二酸化炭素の基準は1,500ppm以下である。","定期環境衛生検査は毎学年1回行う。","学校の照度基準は、建築物衛生法の基準と同一である。"], answer:4, explanation:"学校の照度基準は学校環境衛生基準で独自に定められており、建築物衛生法の基準とは異なります。教室の照度は300lx以上が望ましいとされています。" },
        { id:"1-017", year:2022, text:"水道法に関する次の記述のうち、最も不適当なものはどれか。", choices:["水道事業は、市町村が経営するのが原則である。","水質基準は、厚生労働省令で定められている。","簡易専用水道の設置者は、管理について検査を受けなければならない。","専用水道の水質検査は不要である。","水道技術管理者の設置が義務付けられている。"], answer:3, explanation:"専用水道においても定期的な水質検査が必要です。水道法により、水質基準への適合を確認するための検査が義務付けられています。" },
        { id:"1-018", year:2021, text:"環境基本法に関する次の記述のうち、最も不適当なものはどれか。", choices:["環境基本法は、環境保全の基本理念を定めている。","環境基準は、維持されることが望ましい基準である。","環境基準は、直接の罰則規定を伴う。","環境影響評価の推進について規定している。","国、地方公共団体、事業者、国民の責務を規定している。"], answer:2, explanation:"環境基準は「維持されることが望ましい基準」であり、行政上の目標値です。直接の罰則規定は伴いません。罰則を伴うのは排出基準等の規制基準です。" },
        { id:"1-019", year:2020, text:"下水道法に関する次の記述のうち、最も不適当なものはどれか。", choices:["公共下水道の設置・管理は市町村が行う。","下水道の排除方式には合流式と分流式がある。","特定施設からの排水には水質規制がある。","下水道への接続義務は任意である。","除害施設の設置が必要な場合がある。"], answer:3, explanation:"公共下水道の供用が開始された区域では、遅滞なく下水道に接続する義務があります。任意ではありません。" },
        { id:"1-020", year:2019, text:"浄化槽法に関する次の記述のうち、最も不適当なものはどれか。", choices:["浄化槽の設置には、都道府県知事への届出が必要である。","浄化槽管理者は、保守点検及び清掃を実施しなければならない。","浄化槽の定期検査は、指定検査機関が行う。","単独処理浄化槽の新設は、現在も認められている。","浄化槽の清掃は、浄化槽清掃業の許可を受けた者が行う。"], answer:3, explanation:"単独処理浄化槽（し尿のみ処理）の新設は、平成13年の浄化槽法改正により原則として禁止されています。現在は合併処理浄化槽の設置が義務付けられています。" },
        { id:"1-021", year:2023, text:"ビル管理法における建築物環境衛生管理技術者の職務に該当しないものは、次のうちどれか。", choices:["管理業務計画の立案","管理業務の指揮監督","環境衛生上の維持管理に必要な各種調査の実施","建築物の構造に関する設計変更","測定・検査結果の評価"], answer:3, explanation:"建築物の構造に関する設計変更は建築士の業務であり、建築物環境衛生管理技術者の職務には含まれません。管理技術者は維持管理に関する業務を行います。" },
        { id:"1-022", year:2022, text:"建築物衛生法に基づく登録事業の種類に含まれないものは、次のうちどれか。", choices:["建築物清掃業","建築物空気環境測定業","建築物飲料水水質検査業","建築物電気設備管理業","建築物飲料水貯水槽清掃業"], answer:3, explanation:"建築物衛生法に基づく登録事業は8業種あり、建築物電気設備管理業は含まれません。清掃業、空気環境測定業、水質検査業、貯水槽清掃業、排水管清掃業、ねずみ等防除業、環境衛生総合管理業、空気調和用ダクト清掃業の8種です。" },
        { id:"1-023", year:2021, text:"建築物における衛生的環境の確保に関する法律施行規則に定める空気環境の測定に関する次の記述のうち、最も不適当なものはどれか。", choices:["測定は2月以内ごとに1回行う。","各階ごとに測定を行う。","測定は通常の使用時間中に行う。","1日の測定回数は午前と午後の2回である。","測定記録は5年間保存する。"], answer:3, explanation:"空気環境の測定は1日2回ではなく、各階で1回以上行えばよいとされています。ただし、午前と午後に行うことが推奨されることもありますが、規定としては1日2回が必須ではありません。" },
        { id:"1-024", year:2020, text:"食品衛生法に関する次の記述のうち、最も不適当なものはどれか。", choices:["食品衛生法は、飲食による健康被害の防止を目的としている。","食品営業施設には営業許可が必要である。","食品衛生管理者又は食品衛生責任者の設置が必要である。","食品衛生法は環境省が所管している。","食品添加物の使用基準が定められている。"], answer:3, explanation:"食品衛生法は厚生労働省（及び消費者庁）が所管しています。環境省ではありません。" },
        { id:"1-025", year:2019, text:"興行場法に関する次の記述のうち、最も不適当なものはどれか。", choices:["興行場とは、映画、演劇、音楽等を公衆に見せる施設をいう。","興行場の経営には、都道府県知事の許可が必要である。","換気、照明、防湿等の衛生措置が義務付けられている。","興行場法は、建築物衛生法より前に制定された。","興行場は特定建築物の用途に含まれない。"], answer:4, explanation:"興行場は建築物衛生法における特定建築物の用途に含まれます。延べ面積が3,000m²以上であれば特定建築物として届出が必要です。" },
        { id:"1-026", year:2023, text:"旅館業法に関する次の記述のうち、最も不適当なものはどれか。", choices:["旅館業の営業には、都道府県知事の許可が必要である。","旅館業は、旅館・ホテル営業、簡易宿所営業、下宿営業に分類される。","宿泊者の衛生に必要な措置を講じなければならない。","旅館業法の衛生措置基準は厚生労働省令で定められている。","民泊（住宅宿泊事業）は旅館業法で規制される。"], answer:4, explanation:"民泊（住宅宿泊事業）は、住宅宿泊事業法（民泊新法）により規制されており、旅館業法の適用外です。旅館業法とは別の法体系で規制されています。" },
        { id:"1-027", year:2022, text:"建築物衛生法に規定する特定建築物に関する次の記述のうち、最も適当なものはどれか。", choices:["工場は特定建築物の用途に該当する。","共同住宅は特定建築物の用途に該当する。","寺院は特定建築物の用途に該当する。","図書館は特定建築物の用途に該当する。","病院は特定建築物の用途に該当する。"], answer:3, explanation:"図書館は建築物衛生法に規定する特定建築物の用途に該当します。工場、共同住宅、寺院、病院は特定建築物の用途に該当しません。" },
        { id:"1-028", year:2021, text:"行政処分に関する次の記述のうち、最も不適当なものはどれか。", choices:["都道府県知事は特定建築物の維持管理について改善命令を出すことができる。","改善命令に従わない場合は罰則がある。","登録業者に対して業務停止命令が出されることがある。","立入検査は、犯罪捜査のために行われる。","虚偽の届出をした場合は罰則の対象となる。"], answer:3, explanation:"建築物衛生法に基づく立入検査は、環境衛生上の維持管理の状況を確認するために行われるものであり、犯罪捜査のために認められたものではありません。" },
        { id:"1-029", year:2020, text:"生活衛生関係営業に関する次の記述のうち、最も不適当なものはどれか。", choices:["理容業は生活衛生関係営業に含まれる。","クリーニング業は生活衛生関係営業に含まれる。","生活衛生同業組合は、営業者の自主的な衛生管理を推進する。","生活衛生関係営業の指導は都道府県が行う。","すべての生活衛生関係営業に営業許可が必要である。"], answer:4, explanation:"すべての生活衛生関係営業に営業許可が必要なわけではありません。例えばクリーニング業は届出制であり、許可制ではありません。" },
        { id:"1-030", year:2019, text:"特定建築物の届出事項に含まれないものは、次のうちどれか。", choices:["特定建築物の名称","特定建築物の所在地","特定建築物の用途","建築物環境衛生管理技術者の氏名","建築物の建築費用"], answer:4, explanation:"建築物の建築費用は特定建築物の届出事項に含まれません。届出事項は、名称、所在地、用途、延べ面積、管理技術者の氏名等です。" },
        { id:"1-002", year:2023, text:"建築物における衛生的環境の確保に関する法律（建築物衛生法）に関する次の記述のうち、最も不適当なものはどれか。", choices:["特定建築物とは、興行場、百貨店、集会場、図書館等の用途に供される建築物をいう。","特定建築物の届出は、所有者等が都道府県知事（保健所設置市は市長）に届け出なければならない。","建築物環境衛生管理基準に従って維持管理をしなければならない。","特定建築物の延べ面積の基準は、一律3,000m²以上である。","建築物環境衛生管理技術者の選任が義務付けられている。"], answer:3, explanation:"特定建築物の延べ面積基準は、学校教育法に基づく学校（大学を含む）は8,000m²以上、それ以外の用途は3,000m²以上です。一律3,000m²以上ではないため、選択肢(4)が不適当です。" },
        { id:"1-003", year:2022, text:"建築物環境衛生管理技術者に関する次の記述のうち、最も不適当なものはどれか。", choices:["建築物環境衛生管理技術者は、特定建築物ごとに選任しなければならない。","建築物環境衛生管理技術者は、同時に2以上の特定建築物の管理技術者となることができる。","建築物環境衛生管理技術者は、維持管理が環境衛生管理基準に従って行われるよう監督しなければならない。","建築物環境衛生管理技術者の意見を尊重しなければならない。","建築物環境衛生管理技術者は、環境衛生上必要と認めるときは、管理権原者に意見を述べることができる。"], answer:1, explanation:"建築物環境衛生管理技術者は、原則として同時に2以上の特定建築物の管理技術者となることはできません。1つの特定建築物に専任することが求められています。" },
        { id:"1-004", year:2022, text:"建築物衛生法に基づく事業の登録に関する次の記述のうち、最も不適当なものはどれか。", choices:["登録の有効期間は6年である。","建築物清掃業は登録対象である。","建築物飲料水水質検査業は登録対象である。","登録業者には、業務についての報告徴収や立入検査が行われることがある。","登録は義務ではなく任意である。"], answer:0, explanation:"事業の登録の有効期間は6年です。これは正しい記述です。実際には登録の有効期間は6年で正しく、最も不適当なのは他の選択肢の内容になります。建築物衛生法に基づく事業登録は任意の制度であり、8業種が対象です。" },
        { id:"1-005", year:2021, text:"世界保健機関（WHO）憲章における健康の定義に関する次の記述のうち、最も適当なものはどれか。", choices:["健康とは、身体的に疾病がない状態をいう。","健康とは、身体的及び精神的に疾病がない状態をいう。","健康とは、身体的、精神的及び社会的に完全に良好な状態であり、単に疾病がないということではない。","健康とは、日常生活を支障なく送ることができる状態をいう。","健康とは、医学的に異常が認められない状態をいう。"], answer:2, explanation:"WHO憲章では、健康を「身体的、精神的及び社会的に完全に良好な状態であり、単に疾病又は病弱の存在しないことではない」と定義しています。" },
        { id:"1-006", year:2021, text:"感染症の予防及び感染症の患者に対する医療に関する法律（感染症法）における感染症の類型に関する次の記述のうち、最も適当なものはどれか。", choices:["一類感染症には、インフルエンザが含まれる。","二類感染症には、結核が含まれる。","三類感染症には、麻しんが含まれる。","四類感染症には、コレラが含まれる。","五類感染症には、ペストが含まれる。"], answer:1, explanation:"感染症法では、結核は二類感染症に分類されています。一類はエボラ出血熱、ペスト等、三類はコレラ、腸チフス等、四類はデング熱等、五類はインフルエンザ、麻しん等です。" },
        { id:"1-007", year:2020, text:"建築物衛生法に規定する特定建築物の用途に該当しないものは、次のうちどれか。", choices:["事務所","博物館","百貨店","工場","旅館"], answer:3, explanation:"工場は建築物衛生法に規定する特定建築物の用途に該当しません。特定建築物の用途は、興行場、百貨店、集会場、図書館、博物館、美術館、遊技場、店舗、事務所、学校、旅館等です。" },
        { id:"1-008", year:2020, text:"建築物衛生法に基づく届出に関する次の記述のうち、最も不適当なものはどれか。", choices:["届出は使用開始後1ヶ月以内に行う。","届出義務者は当該建築物の所有者等である。","届出先は都道府県知事（保健所設置市は市長）である。","届出事項に変更があった場合も届出が必要である。","届出を怠った場合の罰則は懲役刑のみである。"], answer:4, explanation:"届出を怠った場合の罰則は罰金刑です。懲役刑のみではありません。特定建築物の届出は使用開始後1ヶ月以内に、所有者等が都道府県知事等に届け出る義務があります。" },
        { id:"1-009", year:2019, text:"労働安全衛生法に規定する作業環境測定に関する次の記述のうち、最も不適当なものはどれか。", choices:["事務所の作業環境測定は2月以内ごとに1回行う。","中央管理方式の空調設備のある事務所が対象である。","測定項目に一酸化炭素が含まれる。","測定項目に気温が含まれる。","測定結果は1年間保存する。"], answer:4, explanation:"作業環境測定の記録は3年間保存する必要があります。1年間ではありません。事務所の作業環境測定は2月以内ごとに1回、一酸化炭素、二酸化炭素、気温、相対湿度、気流について行います。" },
        { id:"1-010", year:2019, text:"興行場法、旅館業法などの生活衛生関係営業に関する法律の所管省庁として、正しいものは次のうちどれか。", choices:["経済産業省","国土交通省","厚生労働省","環境省","総務省"], answer:2, explanation:"生活衛生関係営業に関する法律は厚生労働省の所管です。興行場法、旅館業法、公衆浴場法、理容師法、美容師法、クリーニング業法等がこれに含まれます。" },
        { id:"1-011", year:2023, text:"レジオネラ症に関する次の記述のうち、最も不適当なものはどれか。", choices:["レジオネラ属菌は、自然界の土壌や淡水に広く分布している。","冷却塔水は、レジオネラ属菌の繁殖場所となりうる。","感染経路は主にヒトからヒトへの飛沫感染である。","免疫力の低い高齢者等が感染しやすい。","循環式浴槽水の衛生管理が重要である。"], answer:2, explanation:"レジオネラ症の感染経路は、レジオネラ属菌を含むエアロゾル（微細な水滴）の吸入によるものであり、ヒトからヒトへの感染は通常起こりません。冷却塔、循環式浴槽、加湿器等の水系設備の衛生管理が重要です。" },
        { id:"1-012", year:2022, text:"建築基準法に関する次の記述のうち、最も不適当なものはどれか。", choices:["居室の天井の高さは2.1m以上でなければならない。","居室には、換気のための窓その他の開口部を設けなければならない。","換気設備のない居室の換気に有効な開口部面積は、床面積の1/20以上でなければならない。","建築基準法は、国民の生命、健康及び財産の保護を図ることを目的としている。","特殊建築物には、劇場、病院、学校等が含まれる。"], answer:2, explanation:"換気設備のない居室の換気に有効な開口部面積は、床面積の1/20以上ではなく、1/20以上が換気、採光は1/7以上等の基準があります。正確には換気のための開口部面積は床面積の1/20以上が正しいです。" }
      ]
    },
    {
      id: 2, name: "建築物の環境衛生", shortName: "環境衛生",
      questions: [
        { id:"2-001", year:2023, text:"温熱環境の4要素として、正しい組合せは次のうちどれか。", choices:["気温、湿度、気流、放射熱（輻射熱）","気温、湿度、気流、気圧","気温、湿度、照度、放射熱","気温、気流、気圧、騒音","気温、湿度、気圧、照度"], answer:0, explanation:"温熱環境の4要素（温熱4要素）は、気温（空気温度）、湿度（相対湿度）、気流（風速）、放射熱（輻射熱・平均放射温度）です。これに着衣量と代謝量を加えた6要素で温熱環境が評価されます。" },
        { id:"2-002", year:2023, text:"建築物環境衛生管理基準に定める空気環境の基準値に関する次の記述のうち、最も不適当なものはどれか。", choices:["浮遊粉じんの量は、0.15mg/m³以下であること。","一酸化炭素の含有率は、10ppm以下であること。","二酸化炭素の含有率は、1,000ppm以下であること。","温度は、17℃以上28℃以下であること。","相対湿度は、40%以上70%以下であること。"], answer:1, explanation:"建築物環境衛生管理基準における一酸化炭素の含有率は6ppm以下（特別な場合は10ppm以下）です。10ppm以下は特例値であり、原則は6ppm以下のため、この記述は不適当です。" },
        { id:"2-003", year:2022, text:"シックハウス症候群に関する次の記述のうち、最も不適当なものはどれか。", choices:["ホルムアルデヒドが主な原因物質の一つである。","新築・改築直後の建築物で発生しやすい。","症状には、目の刺激感、頭痛、倦怠感などがある。","換気を十分に行うことが対策として有効である。","原因物質は室内にのみ存在し、屋外には存在しない。"], answer:4, explanation:"シックハウス症候群の原因物質（ホルムアルデヒド、VOC等）は、建材や家具から放散されるだけでなく、屋外の大気中にも存在します。室内にのみ存在するという記述は誤りです。" },
        { id:"2-004", year:2022, text:"騒音に関する次の記述のうち、最も不適当なものはどれか。", choices:["騒音レベルの単位はdB（デシベル）である。","騒音は、聴力障害の原因となることがある。","等価騒音レベル（LAeq）は、変動騒音の評価に用いられる。","A特性音圧レベルは、人の聴覚特性を考慮した値である。","騒音レベルが2倍になると、dB値も2倍になる。"], answer:4, explanation:"dB（デシベル）は対数スケールで表されるため、音圧（エネルギー）が2倍になっても、騒音レベルは約3dB増加するだけであり、dB値が2倍になるわけではありません。" },
        { id:"2-005", year:2021, text:"照明に関する次の記述のうち、最も不適当なものはどれか。", choices:["照度の単位はルクス（lx）である。","事務所の推奨照度は300～750lxである。","グレアとは、まぶしさにより視覚に不快感を与える現象をいう。","色温度が高い光源ほど赤みを帯びた光色となる。","演色性とは、光源による色の見え方の性質をいう。"], answer:3, explanation:"色温度が高い光源ほど青白い光色となり、低いほど赤みを帯びた（暖かみのある）光色となります。例えば白熱電球（約2,800K）は暖色、昼光色蛍光灯（約6,500K）は寒色です。" },
        { id:"2-006", year:2021, text:"電磁波に関する次の記述のうち、最も不適当なものはどれか。", choices:["紫外線は、殺菌作用を持つ。","赤外線は、温熱効果がある。","マイクロ波は、電子レンジに利用されている。","可視光線の波長は、紫外線より短い。","X線は、医療の画像診断に利用されている。"], answer:3, explanation:"可視光線の波長（約380～780nm）は紫外線の波長（約10～380nm）より長いです。電磁波は波長が短い順に、ガンマ線→X線→紫外線→可視光線→赤外線→マイクロ波→電波です。" },
        { id:"2-007", year:2020, text:"浮遊粉じんに関する次の記述のうち、最も不適当なものはどれか。", choices:["PM2.5とは、粒径2.5μm以下の微小粒子状物質をいう。","建築物衛生法の管理基準では、浮遊粉じんは0.15mg/m³以下と定められている。","たばこの煙は、室内の浮遊粉じんの主な発生源の一つである。","粉じんの粒径が小さいほど、肺の奥深くまで到達しやすい。","浮遊粉じんの測定は、年に1回行えばよい。"], answer:4, explanation:"建築物衛生法では、浮遊粉じんの測定は2月以内ごとに1回行うことが定められています。年に1回では不十分です。空気環境測定は原則として2月以内ごとに1回実施する必要があります。" },
        { id:"2-008", year:2020, text:"室内空気汚染物質と健康影響に関する次の記述のうち、最も不適当なものはどれか。", choices:["二酸化炭素は、室内空気汚染の指標として用いられる。","一酸化炭素は、ヘモグロビンと結合して酸素運搬を阻害する。","ホルムアルデヒドの室内濃度指針値は0.08ppmである。","オゾンは、光化学スモッグの原因物質の一つである。","二酸化窒素は、無臭の気体である。"], answer:4, explanation:"二酸化窒素（NO₂）は、赤褐色で刺激臭のある気体です。無臭ではありません。一酸化窒素（NO）は無色・無臭ですが、二酸化窒素とは性質が異なります。" },
        { id:"2-009", year:2019, text:"アスベスト（石綿）に関する次の記述のうち、最も不適当なものはどれか。", choices:["アスベストの吸入は、中皮腫の原因となる。","アスベストは、現在は原則として製造・使用が禁止されている。","石綿障害予防規則により、解体等工事における飛散防止措置が規定されている。","アスベストによる健康被害は、曝露後比較的短期間で発症する。","アスベストは、かつては耐火被覆材等に広く使用されていた。"], answer:3, explanation:"アスベストによる健康被害（中皮腫、肺がん等）は、曝露後の潜伏期間が20～40年と非常に長いのが特徴です。短期間で発症するという記述は誤りです。" },
        { id:"2-010", year:2019, text:"喫煙対策に関する次の記述のうち、最も不適当なものはどれか。", choices:["受動喫煙防止対策は健康増進法に規定されている。","特定施設では原則屋内禁煙とされている。","喫煙専用室には技術的基準が設けられている。","副流煙には主流煙より多くの有害物質が含まれる。","空気清浄機の設置のみで受動喫煙は十分に防止できる。"], answer:4, explanation:"空気清浄機はたばこの煙に含まれる粒子状物質を除去できますが、一酸化炭素やガス状物質は除去できないため、空気清浄機の設置のみでは受動喫煙を十分に防止することはできません。" },
        { id:"2-011", year:2023, text:"人体の温熱調節に関する次の記述のうち、最も不適当なものはどれか。", choices:["体温調節中枢は視床下部にある。","発汗は、体温上昇時の放熱手段である。","ふるえは、寒冷時の産熱手段である。","皮膚血管の収縮は、放熱を促進する。","不感蒸泄は、意識されない蒸発による放熱である。"], answer:3, explanation:"皮膚血管の収縮は、皮膚表面への血流量を減少させ、放熱を抑制します。放熱を促進するのは皮膚血管の拡張です。" },
        { id:"2-012", year:2022, text:"PMV（予測平均温冷感申告）に関する次の記述のうち、最も不適当なものはどれか。", choices:["PMVは、温熱環境の快適性を評価する指標である。","PMVの値は-3から+3の範囲で表される。","PMV=0は、熱的に中立な状態を示す。","ISO 7730では、PMVが-0.5～+0.5の範囲を快適とする。","PMVは気温のみで算出される。"], answer:4, explanation:"PMVは気温だけでなく、湿度、気流、放射温度の温熱4要素に加え、着衣量と代謝量の計6要素から算出されます。" },
        { id:"2-013", year:2021, text:"有効温度（ET）に関する次の記述のうち、最も不適当なものはどれか。", choices:["有効温度は、温熱環境を総合的に評価する指標である。","有効温度は、気温、湿度、気流の3要素を総合した指標である。","新有効温度（ET*）は、放射の影響も考慮している。","有効温度は、着衣量の影響を考慮している。","WBGT（湿球黒球温度）は、暑熱環境の評価に用いられる。"], answer:3, explanation:"有効温度（ET）は気温、湿度、気流の3要素を総合した指標であり、着衣量の影響は考慮していません。着衣量まで考慮したのはPMVやSET*です。" },
        { id:"2-014", year:2020, text:"振動に関する次の記述のうち、最も不適当なものはどれか。", choices:["振動の評価には、振動加速度レベル（dB）が用いられる。","振動規制法により、特定施設からの振動が規制されている。","全身振動は、内臓障害や腰痛の原因となることがある。","局所振動は、白ろう病（レイノー現象）の原因となることがある。","人体は、100Hz以上の振動に最も敏感である。"], answer:4, explanation:"人体は4～8Hz程度の上下振動に最も敏感です。100Hz以上ではなく、低周波域の振動に対する感受性が高いのが特徴です。" },
        { id:"2-015", year:2019, text:"水質汚濁に関する次の記述のうち、最も不適当なものはどれか。", choices:["COD（化学的酸素要求量）は、水質汚濁の指標である。","DO（溶存酸素量）が高いほど、水質は良好である。","富栄養化は、窒素やリンの流入が原因で起こる。","赤潮は、海域での富栄養化現象の一つである。","SS（浮遊物質量）が少ないほど、水の透明度は低い。"], answer:4, explanation:"SS（浮遊物質量）が少ないほど、水の透明度は高くなります。SSが多いと水が濁り、透明度が低下します。" },
        { id:"2-016", year:2023, text:"上水の塩素消毒に関する次の記述のうち、最も不適当なものはどれか。", choices:["遊離残留塩素は、結合残留塩素より殺菌力が強い。","給水栓では遊離残留塩素0.1mg/L以上を保持する。","トリハロメタンは、塩素消毒の副生成物である。","残留塩素が多いほど、常に安全性が高まる。","クリプトスポリジウムは塩素消毒に対して抵抗性がある。"], answer:3, explanation:"残留塩素は殺菌に必要ですが、過剰な塩素はトリハロメタン等の有害な消毒副生成物を増加させるため、多ければ多いほど良いとは言えません。適正な濃度管理が重要です。" },
        { id:"2-017", year:2022, text:"WBGT（湿球黒球温度）に関する次の記述のうち、最も不適当なものはどれか。", choices:["WBGTは、暑熱環境のリスク評価に用いられる。","屋外のWBGTは、自然湿球温度、黒球温度、乾球温度から算出される。","屋内のWBGTは、自然湿球温度と黒球温度から算出される。","WBGTの単位は℃である。","WBGTの基準値は、作業強度に関係なく一定である。"], answer:4, explanation:"WBGTの基準値は作業強度（代謝率）によって異なります。作業強度が高いほど基準値は低く設定されます。例えば安静時は33℃、重作業時は25℃等です。" },
        { id:"2-018", year:2021, text:"室内環境と健康影響に関する次の記述のうち、最も不適当なものはどれか。", choices:["低湿度環境は、皮膚や粘膜の乾燥を引き起こす。","高湿度環境は、カビやダニの発生を促進する。","二酸化炭素濃度の上昇は、眠気や集中力低下を引き起こす。","気流が大きいと、ドラフト感（不快な気流感）を生じる。","二酸化炭素は、高濃度でも人体に無害である。"], answer:4, explanation:"二酸化炭素は高濃度になると頭痛、めまい、意識障害等を引き起こし、極めて高濃度では生命に危険があります。通常の環境では直接的な健康影響は少ないですが、無害ではありません。" },
        { id:"2-019", year:2020, text:"紫外線に関する次の記述のうち、最も不適当なものはどれか。", choices:["紫外線は、殺菌作用を持つ。","紫外線は、ビタミンDの生成を促進する。","UV-Cは、大部分がオゾン層で吸収される。","過度の紫外線曝露は、皮膚がんのリスクを高める。","紫外線は、可視光線より波長が長い。"], answer:4, explanation:"紫外線は可視光線より波長が短い電磁波です。波長が長い順に、赤外線→可視光線→紫外線です。" },
        { id:"2-020", year:2019, text:"室内の化学物質に関する次の記述のうち、最も不適当なものはどれか。", choices:["トルエンは、塗料や接着剤に含まれるVOCである。","キシレンは、揮発性有機化合物の一つである。","パラジクロロベンゼンは、防虫剤として使用される。","ホルムアルデヒドの室内濃度指針値は0.08ppmである。","VOC（総揮発性有機化合物）の暫定目標値は4,000μg/m³である。"], answer:4, explanation:"厚生労働省が定めるTVOC（総揮発性有機化合物）の暫定目標値は400μg/m³です。4,000μg/m³ではありません。" },
        { id:"2-021", year:2023, text:"一酸化炭素中毒に関する次の記述のうち、最も不適当なものはどれか。", choices:["一酸化炭素は無色・無臭の気体である。","一酸化炭素はヘモグロビンとの結合力が酸素の約200倍である。","一酸化炭素中毒の初期症状は頭痛やめまいである。","軽度の一酸化炭素中毒では、後遺症は残らない。","不完全燃焼が一酸化炭素の主な発生原因である。"], answer:3, explanation:"一酸化炭素中毒は軽度であっても、遅発性の後遺症（記憶障害、人格変化等）が生じることがあります。軽度だから後遺症が残らないとは言えません。" },
        { id:"2-022", year:2022, text:"音の性質に関する次の記述のうち、最も不適当なものはどれか。", choices:["音速は、気温が高いほど速くなる。","音の周波数が高いほど、高い音として聞こえる。","人の可聴周波数範囲は、約20Hz～20,000Hzである。","NC値は、室内の許容騒音レベルの評価に用いられる。","音のエネルギーが10倍になると、音圧レベルは20dB増加する。"], answer:4, explanation:"音のエネルギー（パワー）が10倍になると、音圧レベルは10dB増加します。20dBではありません。音圧が10倍のとき20dB増加しますが、エネルギーと音圧は異なります。" },
        { id:"2-023", year:2021, text:"放射線に関する次の記述のうち、最も不適当なものはどれか。", choices:["ラドンは、天然放射性物質であり、室内空気中にも存在する。","シーベルト（Sv）は、人体への放射線の影響を表す単位である。","ベクレル（Bq）は、放射能の強さを表す単位である。","自然放射線による被ばくは存在しない。","グレイ（Gy）は、吸収線量の単位である。"], answer:3, explanation:"自然放射線による被ばくは存在します。宇宙線、大地、食物、空気中のラドン等から、日本人は年間平均約2.1mSvの自然放射線を受けています。" },
        { id:"2-024", year:2020, text:"ホルムアルデヒドに関する次の記述のうち、最も不適当なものはどれか。", choices:["ホルムアルデヒドは、刺激臭のある無色の気体である。","合板やパーティクルボードの接着剤から放散される。","シックハウス症候群の主要な原因物質である。","建築基準法により、内装仕上げ材の使用面積が制限されている。","ホルムアルデヒドは、温度が低いほど放散量が多い。"], answer:4, explanation:"ホルムアルデヒドの放散量は温度が高いほど多くなります。温度が10℃上昇すると放散量は約2倍になるとされています。" },
        { id:"2-025", year:2019, text:"オゾンに関する次の記述のうち、最も不適当なものはどれか。", choices:["オゾンは特有の臭気を持つ気体である。","オゾンは強い酸化力を持ち、殺菌に利用される。","コピー機やレーザープリンタからオゾンが発生することがある。","成層圏のオゾン層は紫外線を吸収する。","オゾンは人体に無害である。"], answer:4, explanation:"オゾンは高濃度では呼吸器障害を引き起こす有害な気体です。環境基準として光化学オキシダント（主にオゾン）の基準が設定されています。" },
        { id:"2-026", year:2023, text:"照明環境に関する次の記述のうち、最も不適当なものはどれか。", choices:["タスク・アンビエント照明は、省エネルギーに有効である。","昼光利用は、省エネルギーと快適性の向上に寄与する。","照度の均斉度は、照明の均一さを表す指標である。","VDT作業では、画面への映り込み（グレア）に注意が必要である。","照度基準は、作業の種類に関係なく一定である。"], answer:4, explanation:"照度基準は作業の種類によって異なります。JIS Z 9110等で、事務作業は750lx、廊下は100lx等、作業内容に応じた推奨照度が定められています。" },
        { id:"2-027", year:2022, text:"VDT（Visual Display Terminal）作業に関する次の記述のうち、最も不適当なものはどれか。", choices:["VDT作業は、眼精疲労の原因となることがある。","ディスプレイ画面の上端は、目の高さ以下にする。","1時間連続作業した場合、10～15分の休憩を取ることが推奨される。","作業場所の照度は、300～1,000lxが推奨される。","ディスプレイまでの視距離は、20cm以下が望ましい。"], answer:4, explanation:"ディスプレイまでの視距離は40cm以上が推奨されています。20cm以下では近すぎて眼精疲労が増加します。" },
        { id:"2-028", year:2021, text:"色彩に関する次の記述のうち、最も不適当なものはどれか。", choices:["マンセル表色系は、色相・明度・彩度で色を表す。","暖色系の色は、心理的に温かさを感じさせる。","寒色系の色は、心理的に涼しさを感じさせる。","明度が高い色は、空間を広く感じさせる効果がある。","天井を暗い色にすると、空間が高く感じられる。"], answer:4, explanation:"天井を暗い色にすると圧迫感があり、空間が低く感じられます。天井を明るい色にすると、空間が高く広く感じられる効果があります。" },
        { id:"2-029", year:2020, text:"臭気に関する次の記述のうち、最も不適当なものはどれか。", choices:["臭気の測定には、官能試験法と機器分析法がある。","臭気指数は、悪臭防止法に基づく規制値に用いられる。","嗅覚の順応により、同じ臭気に長時間さらされると感じにくくなる。","活性炭は、臭気の除去に有効な吸着材である。","硫化水素は、無臭の有害ガスである。"], answer:4, explanation:"硫化水素は腐卵臭（卵が腐ったような臭い）を持つ有害ガスです。無臭ではありません。ただし高濃度では嗅覚が麻痺して感じなくなる危険があります。" },
        { id:"2-030", year:2019, text:"花粉症に関する次の記述のうち、最も不適当なものはどれか。", choices:["花粉症はI型アレルギー反応である。","スギ花粉は春季の主要なアレルゲンである。","空気清浄機のHEPAフィルタは花粉除去に有効である。","室内の換気を増やすことが花粉症対策として最も有効である。","花粉飛散量は気象条件に影響される。"], answer:3, explanation:"花粉シーズンに換気を増やすと、屋外の花粉が室内に流入するため、花粉症対策としては逆効果です。花粉シーズンは窓を閉め、空気清浄機を使用する等の対策が有効です。" }
      ]
    },
    {
      id: 3, name: "空気環境の調整", shortName: "空気環境",
      questions: [
        { id:"3-001", year:2023, text:"次の用語とその単位との組合せとして、最も不適当なものはどれか。", choices:["絶対湿度 ── kg/kg(DA)","熱貫流抵抗 ── m²・K/W","輝度 ── cd/m²","音響透過損失 ── dB","比熱 ── kJ/kg(DA)"], answer:4, explanation:"比熱の単位はkJ/(kg・K)であり、kJ/kg(DA)ではありません。kJ/kg(DA)は空気の比エンタルピーの単位です。比熱は物質1kgを1K上昇させるのに必要な熱量を表します。" },
        { id:"3-002", year:2023, text:"空気調和設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["単一ダクト方式は、各室の個別制御が困難である。","変風量（VAV）方式は、負荷変動に対応しやすい。","ファンコイルユニット方式は、個別制御性に優れる。","二重ダクト方式は、冷風と温風の2本のダクトを用いる。","定風量（CAV）方式は、送風量を変化させて室温を制御する。"], answer:4, explanation:"定風量（CAV）方式は送風量を一定に保ち、送風温度を変化させて室温を制御します。送風量を変化させるのは変風量（VAV）方式です。" },
        { id:"3-003", year:2022, text:"湿り空気に関する次の記述のうち、最も不適当なものはどれか。", choices:["相対湿度100%のとき、乾球温度と湿球温度は等しい。","露点温度とは、空気を冷却したとき結露が始まる温度をいう。","絶対湿度は、乾き空気1kgに含まれる水蒸気の質量で表す。","相対湿度が同じであれば、気温が異なっても絶対湿度は同じである。","湿り空気線図は、空調計算に広く用いられる。"], answer:3, explanation:"相対湿度が同じでも、気温が異なれば飽和水蒸気量が変わるため、絶対湿度は異なります。気温が高いほど飽和水蒸気量が多くなるため、同じ相対湿度でも絶対湿度は大きくなります。" },
        { id:"3-004", year:2022, text:"冷凍機に関する次の記述のうち、最も不適当なものはどれか。", choices:["遠心冷凍機は、大容量の冷凍に適している。","吸収式冷凍機は、冷媒に水、吸収剤に臭化リチウムを使用するものが多い。","成績係数（COP）は、冷凍能力を消費エネルギーで除した値である。","ヒートポンプは、冷房と暖房の両方に使用できる。","圧縮式冷凍機の冷媒として、現在もフロン（CFC）が広く使用されている。"], answer:4, explanation:"オゾン層を破壊するフロン（CFC）は、モントリオール議定書により生産・使用が全廃されています。現在はHFC（ハイドロフルオロカーボン）等の代替冷媒が使用されています。" },
        { id:"3-005", year:2021, text:"換気に関する次の記述のうち、最も不適当なものはどれか。", choices:["第一種換気は、給気・排気ともに機械換気で行う方式である。","第二種換気は、給気を機械換気、排気を自然換気で行う方式である。","第三種換気は、給気を自然換気、排気を機械換気で行う方式である。","必要換気量は、室内の二酸化炭素濃度を基準に算出することが多い。","換気回数とは、1時間あたりの換気量を室容積で除した値である。"], answer:-1, explanation:"この問題ではすべての記述が適当です。第一種（機械給排気）、第二種（機械給気・自然排気）、第三種（自然給気・機械排気）が換気の3方式です。必要換気量の算出にはCO₂基準が多く用いられます。" },
        { id:"3-006", year:2021, text:"ボイラに関する次の記述のうち、最も不適当なものはどれか。", choices:["鋳鉄製ボイラは、蒸気ボイラとして使用される。","炉筒煙管ボイラは、比較的小型のビルに多く使用される。","水管ボイラは、大容量・高圧に適している。","貫流ボイラは、保有水量が少なく起動が早い。","真空式温水発生機は、ボイラとしての法的規制を受けない。"], answer:0, explanation:"鋳鉄製ボイラは温水ボイラとして使用され、蒸気ボイラとしては使用されません。鋳鉄は引張強度が低く、高圧の蒸気に耐えられないためです。蒸気ボイラには鋼製ボイラが使用されます。" },
        { id:"3-007", year:2020, text:"ダクトに関する次の記述のうち、最も不適当なものはどれか。", choices:["亜鉛鉄板は、一般空調ダクトに広く使用される材料である。","フレキシブルダクトは、ダクトと吹出口の接続等に使用される。","ダクトの圧力損失は、風速の2乗に比例する。","長方形ダクトのアスペクト比は、大きいほど効率がよい。","スパイラルダクトは、丸ダクトの一種である。"], answer:3, explanation:"長方形ダクトのアスペクト比（長辺と短辺の比）は、大きくなるほど同じ断面積でも摩擦による圧力損失が増加するため、効率が悪くなります。アスペクト比は4以下が推奨されます。" },
        { id:"3-008", year:2020, text:"結露に関する次の記述のうち、最も不適当なものはどれか。", choices:["表面結露は、壁体等の表面温度が露点温度以下になると発生する。","内部結露は、壁体内部で水蒸気が凝結する現象である。","断熱性能を高めることは、結露防止に有効である。","室内側に防湿層を設けることは、内部結露防止に有効である。","換気量を減らすことは、結露防止に有効である。"], answer:4, explanation:"換気量を減らすと、室内の水蒸気が排出されにくくなり、湿度が上昇して結露しやすくなります。結露防止には十分な換気を行い、室内の湿度を適切に管理することが重要です。" },
        { id:"3-009", year:2019, text:"空気浄化装置に関する次の記述のうち、最も不適当なものはどれか。", choices:["HEPAフィルタは、0.3μmの粒子に対して99.97%以上の捕集効率を持つ。","電気集じん器は、コロナ放電を利用して粉じんを帯電させて捕集する。","活性炭フィルタは、主にガス状汚染物質の除去に使用される。","エアフィルタの性能は、粉じん捕集率のみで評価される。","プレフィルタは、大きな粉じんを除去し、後段のフィルタの寿命を延ばす役割がある。"], answer:3, explanation:"エアフィルタの性能は、粉じん捕集率だけでなく、圧力損失（通気抵抗）、粉じん保持量（寿命）なども含めて総合的に評価されます。" },
        { id:"3-010", year:2019, text:"自動制御に関する次の記述のうち、最も不適当なものはどれか。", choices:["フィードバック制御は、制御結果を検出して制御量を修正する方式である。","PID制御は、比例・積分・微分の3つの制御動作を組み合わせたものである。","DDC（直接デジタル制御）は、コンピュータにより制御を行う方式である。","BEMS（ビルエネルギー管理システム）は、エネルギー使用の最適化を図るシステムである。","二位置制御は、応答が滑らかで精密な温度制御に適している。"], answer:4, explanation:"二位置制御（オンオフ制御）は、制御対象をオンかオフの2状態で切り替える方式であり、応答に振動（ハンチング）が生じやすく、精密な制御には適していません。精密制御にはPID制御等が用いられます。" },
        { id:"3-011", year:2023, text:"熱伝達に関する次の記述のうち、最も不適当なものはどれか。", choices:["熱伝導は、物質内部を熱が移動する現象である。","対流は、流体の移動により熱が伝わる現象である。","放射は、電磁波により熱が伝わる現象である。","熱貫流率が大きいほど、断熱性能が高い。","熱伝導率の単位はW/(m・K)である。"], answer:3, explanation:"熱貫流率（U値）が大きいほど熱が通りやすく、断熱性能は低くなります。断熱性能が高いとは、熱貫流率が小さい（熱貫流抵抗が大きい）ことを意味します。" },
        { id:"3-012", year:2022, text:"空気線図に関する次の記述のうち、最も不適当なものはどれか。", choices:["空気線図は、湿り空気の状態を図示したものである。","乾球温度と相対湿度が決まれば、他の状態量が求められる。","等エンタルピー線は、湿球温度線とほぼ平行である。","顕熱比（SHF）は、空気線図上の直線の傾きで表される。","露点温度は、空気線図上で飽和曲線との交点から求められる。"], answer:-1, explanation:"この問題ではすべての記述が適当です。空気線図（湿り空気線図）は空調計算の基本ツールであり、乾球温度と相対湿度から他の状態量を読み取ることができます。" },
        { id:"3-013", year:2021, text:"冷却塔に関する次の記述のうち、最も不適当なものはどれか。", choices:["冷却塔は、冷凍機の凝縮器で加温された冷却水を冷却する装置である。","開放型冷却塔は、水の蒸発潜熱を利用して冷却する。","密閉型冷却塔は、冷却水が外気と直接接触しない。","レジオネラ属菌の繁殖防止には、冷却塔水の管理が重要である。","冷却塔の冷却効率は、外気の乾球温度のみで決まる。"], answer:4, explanation:"冷却塔の冷却効率は外気の湿球温度に大きく影響されます。乾球温度のみでは決まりません。湿球温度が低いほど蒸発が促進され、冷却効率が向上します。" },
        { id:"3-014", year:2020, text:"ポンプに関する次の記述のうち、最も不適当なものはどれか。", choices:["渦巻ポンプは、遠心力を利用してwater液体を送る。","ポンプの揚程は、液体を持ち上げる高さを示す。","キャビテーションは、ポンプ内で液体が沸騰する現象である。","ポンプの回転数を2倍にすると、流量は2倍になる。","ポンプの回転数を2倍にすると、動力は2倍になる。"], answer:4, explanation:"ポンプの相似則により、回転数を2倍にすると動力は8倍（2の3乗）になります。流量は回転数に比例、揚程は回転数の2乗に比例、動力は回転数の3乗に比例します。" },
        { id:"3-015", year:2019, text:"送風機に関する次の記述のうち、最も不適当なものはどれか。", choices:["遠心送風機には、前向き羽根、後向き羽根、ラジアル羽根がある。","軸流送風機は、大風量・低圧力の用途に適している。","多翼送風機（シロッコファン）は、前向き羽根の遠心送風機である。","サージングは、送風機の運転が不安定になる現象である。","後向き羽根送風機は、前向き羽根送風機より効率が低い。"], answer:4, explanation:"後向き羽根送風機（ターボファン）は、前向き羽根送風機（シロッコファン）より効率が高いです。ただし同じ風量を得るには大型になります。" },
        { id:"3-016", year:2023, text:"暖房方式に関する次の記述のうち、最も不適当なものはどれか。", choices:["温水暖房は、温水を熱媒体として室内を暖める方式である。","蒸気暖房は、蒸気を熱媒体として使用する方式である。","放射暖房は、床や天井からの放射熱を利用する方式である。","ヒートポンプは、冷房と暖房の両方に使用できる。","温風暖房は、輻射熱のみで室内を暖める方式である。"], answer:4, explanation:"温風暖房は、暖めた空気を送風して室内を暖める対流方式であり、輻射熱のみの方式ではありません。輻射熱を利用するのは放射暖房です。" },
        { id:"3-017", year:2022, text:"配管材料に関する次の記述のうち、最も不適当なものはどれか。", choices:["銅管は、給湯配管に広く使用される。","ステンレス鋼管は、耐食性に優れている。","塩化ビニル管は、耐熱性に優れ蒸気配管に適している。","ポリエチレン管は、耐食性に優れた樹脂管である。","硬質塩化ビニルライニング鋼管は、鋼管の内面に塩ビをライニングしたものである。"], answer:2, explanation:"塩化ビニル管は耐熱性が低く、使用温度の上限は60～70℃程度であり、蒸気配管には適していません。蒸気配管には鋼管や銅管が使用されます。" },
        { id:"3-018", year:2021, text:"室内の気流に関する次の記述のうち、最も不適当なものはどれか。", choices:["コアンダ効果とは、気流が壁面や天井面に沿って流れる現象である。","ドラフトとは、不快な局所気流のことをいう。","建築物衛生法の気流の基準は0.5m/s以下である。","置換換気は、床面から低速で清浄空気を供給する方式である。","混合換気は、室内全体を均一に換気する方式である。"], answer:-1, explanation:"すべての記述が適当です。建築物衛生法では気流の基準を0.5m/s以下と定めています。コアンダ効果は吹出口の設計において重要な現象です。" },
        { id:"3-019", year:2020, text:"空調の省エネルギーに関する次の記述のうち、最も不適当なものはどれか。", choices:["全熱交換器は、排気の熱を回収して省エネルギーに寄与する。","外気冷房は、中間期に外気を利用して冷房する方法である。","変流量制御は、配管系の省エネルギーに有効である。","インバータ制御は、モータの回転数を制御して省エネルギーを図る。","CO2濃度に基づく外気量制御は、省エネルギーに逆効果である。"], answer:4, explanation:"CO2濃度に基づく外気量制御（デマンド制御換気）は、在室人数に応じて外気量を調整するため、省エネルギーに有効です。逆効果ではありません。" },
        { id:"3-020", year:2019, text:"吹出口・吸込口に関する次の記述のうち、最も不適当なものはどれか。", choices:["アネモスタット型吹出口は、天井面に設置される拡散型吹出口である。","ライン型吹出口は、線状の吹出口でペリメータゾーンに多く使用される。","ノズル型吹出口は、到達距離が長い。","吸込口は、吹出口に比べて気流の到達距離が長い。","ユニバーサル型吹出口は、風向を調整できる。"], answer:3, explanation:"吸込口は吹出口に比べて気流の到達距離が極めて短いです。吸込口の影響範囲は吸込口近傍に限られ、吹出口のように遠くまで気流が届くことはありません。" },
        { id:"3-021", year:2023, text:"加湿方式に関する次の記述のうち、最も不適当なものはどれか。", choices:["蒸気加湿は、蒸気を空気中に噴霧する方式である。","水噴霧加湿は、水を微細な粒子にして空気中に噴霧する方式である。","気化式加湿は、水を加湿エレメントで蒸発させる方式である。","蒸気加湿では、空気の温度はほとんど変化しない。","水噴霧加湿では、空気の温度はほとんど変化しない。"], answer:4, explanation:"水噴霧加湿（気化式含む）では、水の蒸発に際して空気から熱を奪うため（蒸発潜熱）、空気の温度が低下します。温度が変化しないのは蒸気加湿です。" },
        { id:"3-022", year:2022, text:"空気調和機に関する次の記述のうち、最も不適当なものはどれか。", choices:["エアハンドリングユニット（AHU）は、中央方式の空調に使用される。","パッケージ型空調機は、圧縮機、凝縮器、蒸発器等が一体となっている。","マルチパッケージ型は、1台の室外機に複数の室内機を接続する方式である。","ビルマルチ方式は、個別制御性に優れている。","エアハンドリングユニットは、冷凍機を内蔵している。"], answer:4, explanation:"エアハンドリングユニット（AHU）は、送風機、冷温水コイル、フィルタ、加湿器等で構成されますが、冷凍機は内蔵していません。冷温水は別置の冷凍機やボイラから供給されます。" },
        { id:"3-023", year:2021, text:"フィルタの性能評価に関する次の記述のうち、最も不適当なものはどれか。", choices:["質量法は、粗じん用フィルタの評価に用いられる。","比色法は、中性能フィルタの評価に用いられる。","計数法は、高性能フィルタの評価に用いられる。","HEPA フィルタの捕集効率試験には、DOP法が用いられる。","フィルタの圧力損失は、性能評価項目に含まれない。"], answer:4, explanation:"フィルタの圧力損失（通気抵抗）は重要な性能評価項目です。捕集効率が高くても圧力損失が大きすぎると送風機の負荷が増大するため、両者のバランスが重要です。" },
        { id:"3-024", year:2020, text:"蓄熱システムに関する次の記述のうち、最も不適当なものはどれか。", choices:["水蓄熱は、水の顕熱を利用した蓄熱方式である。","氷蓄熱は、水の潜熱を利用した蓄熱方式である。","蓄熱システムは、電力のピークカットに有効である。","夜間電力を利用した蓄熱は、ランニングコスト削減に寄与する。","蓄熱槽は、水蓄熱より氷蓄熱の方が大きな容積を必要とする。"], answer:4, explanation:"氷蓄熱は水の潜熱（融解熱）を利用するため、同じ蓄熱量を得るのに水蓄熱より小さな容積で済みます。氷の融解潜熱は水の顕熱に比べて大きいためです。" },
        { id:"3-025", year:2019, text:"熱負荷に関する次の記述のうち、最も不適当なものはどれか。", choices:["外壁や屋根からの貫流熱は、構造体負荷に含まれる。","照明器具からの発熱は、室内負荷に含まれる。","人体からの発熱は、顕熱と潜熱に分けられる。","外気負荷は、換気による熱負荷である。","暖房負荷計算には、日射熱取得を考慮しない。"], answer:4, explanation:"暖房負荷計算においても日射熱取得は考慮します。日射は暖房負荷を軽減する要因となるため、正確な負荷計算には日射の影響を考慮する必要があります。" },
        { id:"3-026", year:2023, text:"防煙・排煙設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["排煙設備は、火災時に煙を建築物外に排出する設備である。","自然排煙は、煙の浮力と外部風力を利用する方式である。","機械排煙は、排煙機を用いて強制的に煙を排出する方式である。","防煙垂れ壁は、煙の水平方向への拡散を防止する。","排煙口は、床面に近い低い位置に設ける。"], answer:4, explanation:"排煙口は天井面または壁の上部に設けます。煙は高温のため上昇するので、床面近くではなく天井面付近に排煙口を設置して効率的に排煙します。" },
        { id:"3-027", year:2022, text:"熱源設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["吸収式冷温水機は、冷暖切替が可能である。","ガスエンジンヒートポンプ（GHP）は、ガスエンジンで圧縮機を駆動する。","地中熱ヒートポンプは、地中の安定した温度を利用する。","コージェネレーションは、発電と排熱利用を組み合わせたシステムである。","空冷式チラーは、冷却塔が必要である。"], answer:4, explanation:"空冷式チラーは空気で凝縮器を冷却するため、冷却塔は不要です。冷却塔が必要なのは水冷式チラーです。" },
        { id:"3-028", year:2021, text:"空調配管に関する次の記述のうち、最も不適当なものはどれか。", choices:["密閉式膨張タンクは、配管内の圧力変動を吸収する。","エア抜き弁は、配管内の空気を排出するために設ける。","ストレーナは、配管内の異物を除去する装置である。","定流量弁は、流量を一定に保つ制御弁である。","冷温水配管は、開放回路の方が密閉回路より腐食しにくい。"], answer:4, explanation:"開放回路は空気と接触するため溶存酸素が多くなり、配管の腐食が進みやすくなります。密閉回路の方が空気との接触が少ないため腐食しにくいです。" },
        { id:"3-029", year:2020, text:"換気量の算定に関する次の記述のうち、最も不適当なものはどれか。", choices:["必要換気量は、在室人員1人当たりの換気量から算定できる。","CO₂濃度基準に基づく必要換気量は、Seidel の式で算出できる。","人体からのCO₂発生量は、活動量が多いほど大きい。","外気のCO₂濃度は、一般に400ppm程度である。","室内のCO₂基準値1,000ppmは、CO₂自体の有害性に基づいて定められた。"], answer:4, explanation:"室内CO₂基準値1,000ppmは、CO₂自体の有害性ではなく、室内空気質の総合的な指標として定められたものです。CO₂は人体の代謝に伴い発生するため、他の汚染物質の存在を間接的に示す指標となります。" },
        { id:"3-030", year:2019, text:"空調設備の保守管理に関する次の記述のうち、最も不適当なものはどれか。", choices:["冷却塔の清掃は、使用開始前と使用期間中に行う。","エアフィルタの交換時期は、圧力損失で判断する。","冷温水コイルのフィン清掃は、熱交換効率の維持に重要である。","加湿器の清掃は、レジオネラ属菌対策として重要である。","空調設備の保守管理は、故障してから行えばよい。"], answer:4, explanation:"空調設備の保守管理は、予防保全の考え方に基づき計画的に行うべきです。故障してから対応する事後保全では、室内環境の悪化や修繕コストの増大を招きます。" }
      ]
    },
    {
      id: 4, name: "建築物の構造概論", shortName: "構造概論",
      questions: [
        { id:"4-001", year:2023, text:"CASBEEの評価対象の分野に含まれないものは、次のうちどれか。", choices:["エネルギー消費","火災安全","資源循環","地域環境","室内環境"], answer:1, explanation:"CASBEE（建築環境総合性能評価システム）の評価対象は、エネルギー消費、資源循環、地域環境、室内環境等です。火災安全は建築基準法で規定されるもので、CASBEEの評価対象には含まれません。" },
        { id:"4-002", year:2023, text:"鉄筋コンクリート構造に関する次の記述のうち、最も不適当なものはどれか。", choices:["コンクリートは圧縮力に強い。","鉄筋は引張力に強い。","鉄筋のかぶり厚さは、耐久性に影響する。","コンクリートの水セメント比が大きいほど、強度が高い。","鉄筋とコンクリートの熱膨張係数はほぼ等しい。"], answer:3, explanation:"コンクリートの水セメント比（W/C）が大きいほど、水の割合が多くなり、強度は低下します。水セメント比が小さいほど密実なコンクリートとなり、強度・耐久性が向上します。" },
        { id:"4-003", year:2022, text:"建築物の荷重に関する次の記述のうち、最も不適当なものはどれか。", choices:["固定荷重には、建築物の自重が含まれる。","積載荷重は、建築物の用途によって異なる。","風圧力は、建築物の高さや形状に影響される。","地震力は、建築物の重量に比例する。","積雪荷重は、地域に関係なく一定である。"], answer:4, explanation:"積雪荷重は地域によって大きく異なります。多雪地域では積雪荷重を大きく設計する必要があり、建築基準法施行令で地域ごとの積雪量が規定されています。" },
        { id:"4-004", year:2022, text:"建築物の防火に関する次の記述のうち、最も不適当なものはどれか。", choices:["耐火構造は、火災時に一定時間、構造耐力を維持できる構造をいう。","防火区画は、火災の延焼を防止するために設ける区画をいう。","排煙設備は、火災時の煙を建築物外に排出する設備をいう。","スプリンクラー設備は、消防法に基づく消火設備である。","防火戸は、火災時に開放して避難経路を確保するものである。"], answer:4, explanation:"防火戸は、火災時に閉鎖して延焼を防止するものであり、開放するものではありません。防火戸は常時閉鎖型と、火災時に自動閉鎖する随時閉鎖型があります。" },
        { id:"4-005", year:2021, text:"エレベータに関する次の記述のうち、最も不適当なものはどれか。", choices:["ロープ式エレベータは、高層建築物に多く使用される。","油圧式エレベータは、低層建築物に多く使用される。","エレベータの台数計画には、5分間輸送能力が用いられる。","建築基準法により、定期検査報告が義務付けられている。","非常用エレベータは、すべての建築物に設置が義務付けられている。"], answer:4, explanation:"非常用エレベータの設置が義務付けられているのは、高さ31mを超える建築物です。すべての建築物に設置義務があるわけではありません。" },
        { id:"4-006", year:2021, text:"鉄骨構造に関する次の記述のうち、最も不適当なものはどれか。", choices:["鉄骨構造は、大スパンの建築物に適している。","鉄骨は、不燃材料であるため耐火被覆は不要である。","高力ボルト接合は、鉄骨の接合方法の一つである。","座屈は、細長い部材に圧縮力が作用したときに生じる。","H形鋼は、曲げに対して効率的な断面形状である。"], answer:1, explanation:"鉄骨は不燃材料ですが、高温になると急激に強度が低下するため、耐火被覆が必要です。鉄骨は約600℃で常温時の約半分の強度まで低下します。" },
        { id:"4-007", year:2020, text:"免震構造に関する次の記述のうち、最も不適当なものはどれか。", choices:["免震構造は、地震の揺れを建築物に伝わりにくくする構造である。","積層ゴムアイソレータは、免震装置の一種である。","免震構造の建築物では、上部構造の応答加速度が低減される。","免震層は、一般に建築物の最上階に設けられる。","ダンパーは、免震構造において振動エネルギーを吸収する装置である。"], answer:3, explanation:"免震層は、一般に建築物の基礎部分（地下や1階床下）に設けられます。最上階ではありません。地震の揺れが上部構造に伝わる前に免震装置で吸収するため、基礎と上部構造の間に設置します。" },
        { id:"4-008", year:2020, text:"建築材料に関する次の記述のうち、最も不適当なものはどれか。", choices:["ALCパネルは、軽量で断熱性に優れる。","グラスウールは、断熱材として広く使用される。","石膏ボードは、耐火性に優れた内装材である。","フロートガラスは、板ガラスの一般的な製造法によるガラスである。","アスファルト防水は、屋上防水には使用されない。"], answer:4, explanation:"アスファルト防水は、屋上防水の代表的な工法です。溶融アスファルトとアスファルトルーフィングを積層して防水層を形成する、歴史のある信頼性の高い工法です。" },
        { id:"4-009", year:2019, text:"都市計画法に関する次の記述のうち、最も不適当なものはどれか。", choices:["都市計画区域は、都道府県が指定する。","市街化区域は、すでに市街地を形成している区域等である。","市街化調整区域は、市街化を抑制すべき区域である。","用途地域は、13種類に分類される。","建築基準法の集団規定は、都市計画区域外には適用されない。"], answer:4, explanation:"建築基準法の集団規定は、都市計画区域及び準都市計画区域内に適用されます。また、都道府県知事が指定する区域にも適用される場合があります。一概に都市計画区域外に適用されないとは言えません。" },
        { id:"4-010", year:2019, text:"コンクリートに関する次の記述のうち、最も不適当なものはどれか。", choices:["コンクリートのスランプは、ワーカビリティの指標である。","コンクリートの中性化は、鉄筋の腐食の原因となる。","コンクリートの設計基準強度は、材齢28日の圧縮強度で表す。","コンクリートのひび割れは、構造的に問題とならない。","骨材のアルカリシリカ反応は、コンクリートの劣化原因の一つである。"], answer:3, explanation:"コンクリートのひび割れは、鉄筋の腐食を促進し、構造耐力の低下や漏水の原因となるため、構造的にも大きな問題となります。適切なひび割れ制御が重要です。" },
        { id:"4-011", year:2023, text:"建築物の基礎に関する次の記述のうち、最も不適当なものはどれか。", choices:["直接基礎には、独立基礎、布基礎、べた基礎がある。","杭基礎は、支持層が深い場合に用いられる。","液状化は、砂質地盤で地震時に発生する現象である。","地耐力とは、地盤が建築物の荷重に耐える力をいう。","べた基礎は、軟弱地盤に使用してはならない。"], answer:4, explanation:"べた基礎は建物の底面全体を基礎にするため、荷重を広い面積に分散でき、軟弱地盤にも適しています。使用してはならないということはありません。" },
        { id:"4-012", year:2022, text:"建築設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["受変電設備は、高圧の電力を建築物内で使用する電圧に変換する。","自家発電設備は、非常時の電力供給に使用される。","UPS（無停電電源装置）は、瞬間的な停電から重要機器を保護する。","避雷設備は、高さ20mを超える建築物に設置が義務付けられている。","配電方式には、単相2線式、単相3線式、三相3線式がある。"], answer:-1, explanation:"すべての記述が適当です。避雷設備は建築基準法により高さ20mを超える建築物に設置義務があります。" },
        { id:"4-013", year:2021, text:"建築物の劣化に関する次の記述のうち、最も不適当なものはどれか。", choices:["鉄筋コンクリートの中性化は、二酸化炭素の侵入によって起こる。","塩害は、塩化物イオンにより鉄筋が腐食する現象である。","凍害は、コンクリート内の水分の凍結融解により起こる。","建築物の耐用年数は、構造や維持管理に関係なく一定である。","コンクリートのひび割れは、乾燥収縮によっても発生する。"], answer:3, explanation:"建築物の耐用年数は、構造（木造、RC造、S造等）、維持管理の状況、立地環境等によって大きく異なります。一定ではありません。" },
        { id:"4-014", year:2020, text:"木造建築物に関する次の記述のうち、最も不適当なものはどれか。", choices:["木材は、含水率が高いほど強度が低下する。","木材の繊維飽和点は、含水率約28%である。","在来軸組工法は、柱と梁で構成する工法である。","枠組壁工法（ツーバイフォー）は、壁面で荷重を支持する工法である。","木材は不燃材料に分類される。"], answer:4, explanation:"木材は可燃材料であり、不燃材料ではありません。不燃材料はコンクリート、石、金属等です。木材を不燃化するには不燃処理が必要です。" },
        { id:"4-015", year:2019, text:"建築計画に関する次の記述のうち、最も不適当なものはどれか。", choices:["建ぺい率は、建築面積の敷地面積に対する割合である。","容積率は、延べ面積の敷地面積に対する割合である。","バリアフリーとは、高齢者や障害者の障壁をなくすことをいう。","ユニバーサルデザインは、すべての人が利用しやすい設計をいう。","北側斜線制限は、商業地域のみに適用される。"], answer:4, explanation:"北側斜線制限は、住居系用途地域（第一種・第二種低層住居専用地域、第一種・第二種中高層住居専用地域）に適用されます。商業地域のみではありません。" },
        { id:"4-016", year:2023, text:"建築物の耐震に関する次の記述のうち、最も不適当なものはどれか。", choices:["耐震構造は、建築物自体の強度で地震に抵抗する構造である。","制振構造は、ダンパー等で地震エネルギーを吸収する構造である。","免震構造は、基礎部に免震装置を設けて揺れを低減する構造である。","新耐震基準は、1981年に導入された。","旧耐震基準の建築物は、すべて安全である。"], answer:4, explanation:"旧耐震基準（1981年以前）の建築物は、現行の耐震基準を満たしていない場合が多く、必ずしも安全とは言えません。耐震診断と必要に応じた耐震補強が推奨されています。" },
        { id:"4-017", year:2022, text:"建築物の防火区画に関する次の記述のうち、最も不適当なものはどれか。", choices:["面積区画は、一定面積ごとに防火区画を設ける。","竪穴区画は、吹抜けや階段等の竪穴部分を区画する。","異種用途区画は、用途の異なる部分を区画する。","防火区画を貫通する配管には、措置が不要である。","スパンドレルは、外壁を通じた延焼を防止する部分である。"], answer:3, explanation:"防火区画を貫通する配管には、隙間を不燃材料で充填する等の措置が必要です。貫通部から延焼することを防止するため、法令で措置が義務付けられています。" },
        { id:"4-018", year:2021, text:"建築物の遮音に関する次の記述のうち、最も不適当なものはどれか。", choices:["透過損失が大きいほど、遮音性能が高い。","質量則により、壁の面密度が大きいほど遮音性能が高い。","二重壁は、単一壁より遮音性能を高めることができる。","コインシデンス効果は、特定の周波数で遮音性能が低下する現象である。","吸音と遮音は、同じ原理に基づく。"], answer:4, explanation:"吸音と遮音は異なる原理に基づきます。吸音は音のエネルギーを熱に変換して反射を減らすこと、遮音は音の透過を阻止することです。吸音材は多孔質で軽い材料、遮音材は密実で重い材料が用いられます。" },
        { id:"4-019", year:2020, text:"建築物の防水に関する次の記述のうち、最も不適当なものはどれか。", choices:["メンブレン防水は、不透水性の膜で防水する工法である。","シーリング防水は、目地部等に充填して防水する工法である。","アスファルト防水は、歴史のある信頼性の高い工法である。","シート防水は、合成ゴムや塩化ビニル等のシートを用いる工法である。","防水工事は、建築物の完成後には行うことができない。"], answer:4, explanation:"防水工事は建築物の完成後にも行うことができます。既存建築物の防水改修工事（屋上防水の更新等）は、建物の長寿命化に重要な工事です。" },
        { id:"4-020", year:2019, text:"建築物のバリアフリーに関する次の記述のうち、最も不適当なものはどれか。", choices:["車いす使用者用トイレには、十分な広さが必要である。","スロープの勾配は、1/12以下が望ましい。","点字ブロックは、視覚障害者の誘導に使用される。","エレベータのかご内には、鏡を設置することが望ましい。","バリアフリー法は、不特定多数が利用する建築物に適用される。"], answer:-1, explanation:"すべての記述が適当です。エレベータのかご内の鏡は、車いす使用者が後方を確認するために設置します。バリアフリー法（高齢者、障害者等の移動等の円滑化の促進に関する法律）は特別特定建築物等に適用されます。" },
        { id:"4-021", year:2023, text:"鉄筋コンクリート構造の特徴に関する次の記述のうち、最も不適当なものはどれか。", choices:["耐火性能が高い。","耐久性が高い。","自重が軽い。","成型の自由度が高い。","圧縮力と引張力の両方に抵抗できる。"], answer:2, explanation:"鉄筋コンクリート構造は自重が重いのが欠点の一つです。コンクリートの比重は約2.3で、鉄骨構造と比較して重量があります。" },
        { id:"4-022", year:2022, text:"ガラスに関する次の記述のうち、最も不適当なものはどれか。", choices:["強化ガラスは、フロートガラスを熱処理して強度を高めたものである。","合わせガラスは、2枚のガラスの間に中間膜を挟んだものである。","複層ガラスは、2枚のガラスの間に空気層を設けた断熱ガラスである。","Low-Eガラスは、低放射率膜をコーティングして断熱性を高めたものである。","網入りガラスは、地震時の飛散防止が主目的である。"], answer:4, explanation:"網入りガラスは、火災時にガラスが割れても脱落しにくくし、延焼を防止することが主目的です。地震時の飛散防止ではなく、防火性能が主目的です。" },
        { id:"4-023", year:2021, text:"建築物の非常用設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["非常用照明は、停電時に避難経路を照らすために設置する。","誘導灯は、避難口や避難方向を示す設備である。","非常用進入口は、消防隊の進入のために設ける開口部である。","非常用エレベータは、高さ31mを超える建築物に設置義務がある。","非常用照明の照度は、床面で1lx以上必要である。"], answer:-1, explanation:"すべての記述が適当です。非常用照明は床面で1lx（蛍光灯の場合は2lx）以上の照度が必要です。" },
        { id:"4-024", year:2020, text:"建築物の用途変更に関する次の記述のうち、最も不適当なものはどれか。", choices:["用途変更には確認申請が必要な場合がある。","特殊建築物への用途変更は、確認申請が必要な場合がある。","用途変更時にも建築基準法への適合が求められる。","既存不適格建築物は、用途変更時に現行基準への適合が求められることがある。","すべての用途変更に確認申請が必要である。"], answer:4, explanation:"すべての用途変更に確認申請が必要なわけではありません。類似の用途間の変更や、床面積200m²以下の用途変更等は確認申請が不要な場合があります。" },
        { id:"4-025", year:2019, text:"建築設備の配管スペースに関する次の記述のうち、最も不適当なものはどれか。", choices:["パイプシャフト（PS）は、縦方向の配管スペースである。","パイプスペースは、配管の維持管理のための点検口が必要である。","EPS（電気パイプシャフト）は、電気配線の縦幹線スペースである。","天井懐は、水平方向の配管・ダクトスペースとして利用される。","パイプシャフトは、防火区画の貫通部として処理が不要である。"], answer:4, explanation:"パイプシャフトが防火区画を貫通する場合は、各階ごとに防火区画処理が必要です。竪穴区画として、配管貫通部の隙間を不燃材料で充填する等の措置が必要です。" },
        { id:"4-026", year:2023, text:"建築物の省エネルギーに関する次の記述のうち、最も不適当なものはどれか。", choices:["建築物省エネ法により、一定規模以上の建築物に省エネ基準適合が義務化されている。","ZEB（ネット・ゼロ・エネルギー・ビル）は、年間のエネルギー消費量を実質ゼロにする建築物である。","BELS（建築物省エネルギー性能表示制度）は、第三者評価による省エネ性能表示である。","外壁の断熱強化は、省エネルギーに有効である。","建築物の省エネルギー対策は、設備の効率化のみで達成できる。"], answer:4, explanation:"建築物の省エネルギーは、設備の効率化だけでなく、外壁・屋根の断熱、窓の日射遮蔽、自然採光・自然換気の活用等、建築計画と設備の両面からの対策が必要です。" },
        { id:"4-027", year:2022, text:"鉄骨鉄筋コンクリート構造（SRC造）に関する次の記述のうち、最も不適当なものはどれか。", choices:["SRC造は、鉄骨構造と鉄筋コンクリート構造を組み合わせた構造である。","SRC造は、RC造より耐震性能が高い。","SRC造は、高層建築物に適している。","SRC造は、RC造より施工が容易である。","SRC造は、RC造より粘り強さがある。"], answer:3, explanation:"SRC造は、鉄骨と鉄筋コンクリートを組み合わせるため、RC造より施工が複雑で手間がかかります。施工が容易とは言えません。" },
        { id:"4-028", year:2021, text:"屋根の形式に関する次の記述のうち、最も不適当なものはどれか。", choices:["陸屋根は、平坦な屋根で、ビルに多く採用される。","切妻屋根は、2つの傾斜面で構成される。","寄棟屋根は、4つの傾斜面で構成される。","陸屋根には防水処理が不要である。","片流れ屋根は、1つの傾斜面で構成される。"], answer:3, explanation:"陸屋根は勾配がほとんどないため雨水が滞留しやすく、防水処理が特に重要です。不要どころか、アスファルト防水やシート防水等の確実な防水処理が必須です。" },
        { id:"4-029", year:2020, text:"避難計画に関する次の記述のうち、最も不適当なものはどれか。", choices:["2方向避難は、避難経路を2つ以上確保することをいう。","避難階段には、屋内避難階段と屋外避難階段がある。","特別避難階段は、附室（バルコニー）を経由する階段である。","歩行距離は、居室の最も遠い点から避難口までの距離である。","避難経路の幅は、収容人員に関係なく一定でよい。"], answer:4, explanation:"避難経路の幅は、収容人員に応じて必要な幅が定められています。多くの人が利用する建築物ほど、広い避難経路が必要です。" },
        { id:"4-030", year:2019, text:"建築物の維持保全に関する次の記述のうち、最も不適当なものはどれか。", choices:["建築基準法では、特定建築物の定期調査・報告が義務付けられている。","定期調査は、建築物の構造、防火、避難等について行う。","定期報告は、特定行政庁に対して行う。","長期修繕計画は、建築物の維持保全に重要である。","建築物の維持保全は、法律上の義務はない。"], answer:4, explanation:"建築基準法第8条により、建築物の所有者等は建築物の構造及び建築設備を常時適法な状態に維持するよう努めなければならないとされており、法律上の義務があります。" }
      ]
    },
    {
      id: 5, name: "給水及び排水の管理", shortName: "給排水",
      questions: [
        { id:"5-001", year:2023, text:"給水設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["高置水槽方式は、屋上等に設置した水槽から重力で給水する方式である。","ポンプ直送方式は、受水槽の水をポンプで直接各所に給水する方式である。","水道直結直圧方式は、水道本管の圧力のみで給水する方式である。","クロスコネクションとは、飲料水系統と他の配管系統を直接接続することをいう。","クロスコネクションは、適切な逆流防止装置を設ければ認められる。"], answer:4, explanation:"クロスコネクション（飲料水配管と他系統の配管の直接接続）は、いかなる場合も禁止されています。逆流防止装置の有無にかかわらず、絶対に認められません。" },
        { id:"5-002", year:2023, text:"飲料水の水質基準に関する次の記述のうち、最も不適当なものはどれか。", choices:["一般細菌は、1mL中100個以下（集落数）であること。","大腸菌は、検出されないこと。","pH値は、5.8以上8.6以下であること。","残留塩素は、遊離残留塩素として0.1mg/L以上保持すること。","濁度は、5度以下であること。"], answer:4, explanation:"飲料水の水質基準では、濁度は2度以下とされています。5度以下ではありません。また、色度は5度以下です。濁度と色度の基準値を混同しないよう注意が必要です。" },
        { id:"5-003", year:2022, text:"排水トラップに関する次の記述のうち、最も不適当なものはどれか。", choices:["トラップの封水は、排水管から室内への臭気や害虫の侵入を防ぐ。","封水深は、50mm以上100mm以下が標準である。","自己サイホン作用により封水が失われることがある。","二重トラップは、排水の流れを良くするために推奨される。","蒸発によりトラップの封水が失われることがある。"], answer:3, explanation:"二重トラップとは、1つの排水系統に2つのトラップを直列に設けることであり、間の空気が密封されて排水の流れが阻害されるため、禁止されています。推奨されるものではありません。" },
        { id:"5-004", year:2022, text:"給湯設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["中央式給湯設備は、ボイラ等で加熱した湯を各所に供給する方式である。","レジオネラ属菌対策として、貯湯槽内の温度は60℃以上に保つ。","逃し管は、給湯配管内の圧力上昇を防ぐために設ける。","膨張管は、温度上昇による水の膨張を吸収するために設ける。","給湯の循環ポンプは、使用時間帯のみ運転すればよい。"], answer:4, explanation:"給湯の循環ポンプは、レジオネラ属菌の繁殖防止等の観点から、原則として24時間連続運転が推奨されます。使用時間帯のみの運転では、非運転時に配管内で湯温が低下し、菌が繁殖する恐れがあります。" },
        { id:"5-005", year:2021, text:"排水通気設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["通気管は、排水管内の圧力変動を緩和する役割がある。","伸頂通気方式は、排水立て管の頂部を延長して大気に開放する方式である。","ループ通気方式は、各階の排水横枝管に通気管を設ける方式である。","通気管の末端は、窓等の開口部から離して設ける。","通気管の管径は、排水管の管径より大きくする。"], answer:4, explanation:"通気管の管径は、接続する排水管の管径の1/2以上とされており、排水管より大きくする必要はありません。適正な管径は排水管の管径と通気管の長さから決定されます。" },
        { id:"5-006", year:2021, text:"受水槽に関する次の記述のうち、最も不適当なものはどれか。", choices:["有効容量10m³を超える受水槽は、簡易専用水道として規制を受ける。","受水槽の清掃は、1年以内ごとに1回行う。","受水槽の材質には、FRP（繊維強化プラスチック）が多く使用される。","受水槽の6面すべてについて、保守点検できるスペースが必要である。","受水槽のオーバーフロー管には、トラップを設けてはならない。"], answer:4, explanation:"受水槽のオーバーフロー管の末端には、防虫網を設けますが、トラップを設けてはならないという規定はありません。むしろ間接排水とし、排水口空間を確保することが重要です。" },
        { id:"5-007", year:2020, text:"下水道法に関する次の記述のうち、最も不適当なものはどれか。", choices:["下水とは、生活排水と雨水の総称である。","合流式下水道は、汚水と雨水を同一の管で排除する方式である。","分流式下水道は、汚水と雨水を別々の管で排除する方式である。","公共下水道の設置・管理は、原則として市町村が行う。","下水道法では、除害施設の設置が義務付けられる場合がある。"], answer:0, explanation:"下水道法における下水とは、生活若しくは事業に起因する汚水（し尿を含む）又は雨水をいいます。「生活排水と雨水の総称」という表現は正確ではなく、事業排水も含まれます。" },
        { id:"5-008", year:2020, text:"汚水処理に関する次の記述のうち、最も不適当なものはどれか。", choices:["BOD（生物化学的酸素要求量）は、水質汚濁の指標である。","活性汚泥法は、好気性微生物を利用した処理方法である。","浄化槽法により、浄化槽の維持管理が規定されている。","浄化槽の清掃は、6月以内ごとに1回行う。","浄化槽の定期検査は、毎年1回行う。"], answer:3, explanation:"浄化槽の清掃は、全ばっ気方式の浄化槽は6月以内ごとに1回ですが、一般的な浄化槽の清掃は年1回以上と規定されています。6月以内ごとに1回は全ての浄化槽に適用されるわけではありません。" },
        { id:"5-009", year:2019, text:"給水管の腐食に関する次の記述のうち、最も不適当なものはどれか。", choices:["異種金属接触腐食は、異なる金属を接続した場合に生じる。","溶存酸素は、金属の腐食を促進する。","水のpHが低いほど、腐食しやすい傾向がある。","流速が大きいと、壊食（エロージョン）が生じやすい。","亜鉛めっき鋼管は、腐食が全く生じない。"], answer:4, explanation:"亜鉛めっき鋼管は、亜鉛の犠牲防食作用により腐食が軽減されますが、全く生じないわけではありません。亜鉛が消耗すると鋼管本体が腐食します。使用年数が経過すると赤水の発生等の問題が生じます。" },
        { id:"5-010", year:2019, text:"雨水利用・排水再利用に関する次の記述のうち、最も不適当なものはどれか。", choices:["雨水利用は、水資源の有効活用策の一つである。","排水再利用水は、雑用水として便所洗浄水等に利用される。","排水再利用水の水質基準では、大腸菌が検出されないことが求められる。","排水再利用水は、飲料水としても使用できる。","雨水利用設備には、ろ過装置と消毒装置が必要である。"], answer:3, explanation:"排水再利用水は、便所洗浄水、散水、清掃用水等の雑用水としてのみ使用が認められており、飲料水として使用することはできません。" },
        { id:"5-011", year:2023, text:"給水方式に関する次の記述のうち、最も不適当なものはどれか。", choices:["水道直結増圧方式は、増圧ポンプを用いて給水する方式である。","高置水槽方式は、停電時にも一時的に給水可能である。","ポンプ直送方式は、高置水槽が不要である。","水道直結直圧方式は、大規模ビルに最も適している。","圧力タンク方式は、圧力タンク内の空気圧を利用する。"], answer:3, explanation:"水道直結直圧方式は水道本管の圧力のみで給水するため、水圧の制約から大規模ビルには適していません。大規模ビルにはポンプ直送方式や高置水槽方式が用いられます。" },
        { id:"5-012", year:2022, text:"貯水槽の衛生管理に関する次の記述のうち、最も不適当なものはどれか。", choices:["受水槽の有効容量は、1日最大使用量の1/2程度が目安である。","高置水槽の有効容量は、1日最大使用量の1/10程度が目安である。","FRP製受水槽は、直射日光により藻類が発生することがある。","受水槽のマンホールは、直径60cm以上とする。","受水槽の水の滞留時間は、長いほど衛生的である。"], answer:4, explanation:"受水槽の水の滞留時間が長いと、残留塩素が消失して細菌が繁殖しやすくなります。適切な容量設計により、水の滞留時間を短くすることが衛生管理上重要です。" },
        { id:"5-013", year:2021, text:"排水方式に関する次の記述のうち、最も不適当なものはどれか。", choices:["汚水とは、し尿を含む排水をいう。","雑排水とは、し尿を含まない生活排水をいう。","合流式は、汚水と雑排水を同一の系統で排水する方式である。","分流式は、汚水と雑排水を別々の系統で排水する方式である。","建築物内の排水は、すべて合流式でなければならない。"], answer:4, explanation:"建築物内の排水は合流式に限られません。処理方法や下水道の接続方式によって、分流式も採用されます。特に排水再利用を行う場合は分流式が有利です。" },
        { id:"5-014", year:2020, text:"給水配管に関する次の記述のうち、最も不適当なものはどれか。", choices:["ウォーターハンマー（水撃作用）は、急激な弁の開閉により発生する。","エアチャンバーは、ウォーターハンマー防止装置の一つである。","給水管のサイズは、同時使用率を考慮して決定する。","給水管の流速は、一般に2.0m/s以下が望ましい。","給水管内の圧力は低いほど良い。"], answer:4, explanation:"給水管内の圧力は適正に保つ必要があります。圧力が低すぎると末端の器具に十分な水量が供給されず、高すぎるとウォーターハンマー等の障害が発生します。" },
        { id:"5-015", year:2019, text:"排水管のサイズに関する次の記述のうち、最も不適当なものはどれか。", choices:["排水横管の管径は、排水量に応じて決定する。","排水立て管の管径は、最も大きい排水横枝管の管径以上とする。","排水管の管径は、下流に向かって縮小してはならない。","排水横管の勾配は、管径が大きいほど緩やかにできる。","排水管のサイズは、器具排水負荷単位法で算定できる。"], answer:-1, explanation:"すべての記述が適当です。排水管の設計では、下流に向かって管径を縮小してはならず、器具排水負荷単位法やフィクスチャーユニット法で適正なサイズを算定します。" },
        { id:"5-016", year:2023, text:"水質検査に関する次の記述のうち、最も不適当なものはどれか。", choices:["残留塩素の検査は、毎日行う必要がある（7日以内ごとに1回）。","飲料水の水質検査項目は、水道法の水質基準に基づく。","色度と濁度は、水質検査の基本項目である。","水質検査の記録は、5年間保存する。","水質検査は年に1回行えばすべて足りる。"], answer:4, explanation:"水質検査の頻度は項目により異なります。残留塩素は7日以内ごとに1回、一般項目は6月以内ごとに1回、省略不可項目は毎年等、項目に応じた頻度で行う必要があります。" },
        { id:"5-017", year:2022, text:"排水槽に関する次の記述のうち、最も不適当なものはどれか。", choices:["排水槽は、自然流下で排水できない場合に設置する。","排水槽には、排水ポンプを設置する。","排水槽の清掃は、6月以内ごとに1回行う。","排水槽には、通気管を設ける。","排水槽の底部は、水平にすることが望ましい。"], answer:4, explanation:"排水槽の底部は、排水ポンプの吸込みピットに向かって勾配（1/15～1/10程度）をつけることが望ましいです。水平にすると汚泥が堆積しやすくなります。" },
        { id:"5-018", year:2021, text:"消火設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["屋内消火栓は、初期消火に使用される設備である。","スプリンクラー設備は、自動的に散水して消火する設備である。","連結送水管は、消防ポンプ車から送水して消火する設備である。","泡消火設備は、駐車場等の油火災に適している。","消火器は、建築物の規模に関係なく設置義務がない。"], answer:4, explanation:"消火器は消防法により、一定規模以上の建築物に設置が義務付けられています。建築物の用途・規模に応じて設置基準が定められています。" },
        { id:"5-019", year:2020, text:"排水の水質に関する次の記述のうち、最も不適当なものはどれか。", choices:["BOD（生物化学的酸素要求量）は、有機物による汚濁の指標である。","COD（化学的酸素要求量）は、海域や湖沼の水質基準に用いられる。","pH は、水の酸性・アルカリ性を示す指標である。","ノルマルヘキサン抽出物質は、油分の指標である。","DO（溶存酸素量）が低いほど、水質が良好である。"], answer:4, explanation:"DO（溶存酸素量）が高いほど水質が良好です。DOが低いと酸素が不足し、嫌気性分解が起きて臭気が発生する等、水質が悪化します。" },
        { id:"5-020", year:2019, text:"通気管の設置に関する次の記述のうち、最も不適当なものはどれか。", choices:["通気管は、トラップの封水を保護する役割がある。","各個通気方式は、各トラップに個別の通気管を設ける方式である。","通気管の末端は、窓等の開口部から600mm以上離して設ける。","通気管は排水管より低い位置に接続する。","結合通気管は、排水立て管と通気立て管を接続する。"], answer:3, explanation:"通気管は排水管より高い位置で接続します。低い位置で接続すると排水が通気管に流入してしまい、通気管としての機能を果たせなくなります。" },
        { id:"5-021", year:2023, text:"給湯設備の腐食に関する次の記述のうち、最も不適当なものはどれか。", choices:["給湯管の腐食は、水温が高いほど促進される。","銅管の腐食は、水中の溶存酸素により促進される。","異種金属接触腐食は、異なる金属を接続した場合に生じる。","絶縁継手は、異種金属接触腐食の防止に使用される。","給湯温度を下げることが最も効果的な腐食防止策である。"], answer:4, explanation:"給湯温度を下げると腐食は軽減されますが、レジオネラ属菌の繁殖リスクが高まるため、温度を下げることが最善の策とは言えません。適切な材料選択や防食処理が重要です。" },
        { id:"5-022", year:2022, text:"排水再利用に関する次の記述のうち、最も不適当なものはどれか。", choices:["排水再利用水は、雑用水として利用される。","排水再利用の処理方式には、膜処理法がある。","排水再利用水には、大腸菌に関する基準がある。","排水再利用水の残留塩素は、給水栓で遊離残留塩素0.1mg/L以上を保持する。","排水再利用水の配管は、飲料水配管と兼用できる。"], answer:4, explanation:"排水再利用水の配管は、飲料水配管とは完全に分離する必要があります。クロスコネクション防止のため、配管の兼用は禁止されています。" },
        { id:"5-023", year:2021, text:"ガス設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["都市ガスは、ガス事業法で規制されている。","LPガスは、液化石油ガス法で規制されている。","ガス漏れ警報器の設置が推奨されている。","都市ガスの比重は、空気より重い。","ガス配管には、ガス栓やコックが設けられる。"], answer:3, explanation:"都市ガス（13Aの場合）の比重は空気より軽いです（比重約0.64）。空気より重いのはLPガス（比重約1.5）です。このため、都市ガスの漏れ検知器は天井近くに設置します。" },
        { id:"5-024", year:2020, text:"衛生器具に関する次の記述のうち、最も不適当なものはどれか。", choices:["大便器の洗浄方式には、洗い落とし式、サイホン式等がある。","節水型便器は、少ない水量で洗浄できる。","自動水栓は、節水効果と衛生性の向上に寄与する。","小便器にもトラップが設けられる。","衛生器具の給水口は、越流面より低い位置でもよい。"], answer:4, explanation:"衛生器具の給水口は、越流面（オーバーフロー面）より上方に設けるか、適切な吐水口空間を確保する必要があります。逆流防止のため、越流面より低い位置に設けてはなりません。" },
        { id:"5-025", year:2019, text:"排水管の清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["高圧洗浄法は、高圧の水で管内を清掃する方法である。","ロッド法は、金属製のロッドで管内の詰まりを除去する方法である。","ワイヤ法は、ワイヤを管内に挿入して閉塞物を除去する方法である。","排水管の清掃は、詰まりが発生してから行えばよい。","スネークワイヤは、排水管の清掃に使用される器具である。"], answer:3, explanation:"排水管の清掃は、詰まりが発生する前に定期的に行う予防的清掃が重要です。詰まってからの事後対応では、排水障害による被害が発生します。" },
        { id:"5-026", year:2023, text:"グリーストラップに関する次の記述のうち、最も不適当なものはどれか。", choices:["グリーストラップは、厨房排水中の油脂を分離・捕集する装置である。","グリーストラップは、排水管の詰まり防止に有効である。","グリーストラップの清掃は、定期的に行う必要がある。","グリーストラップは、下水道への油脂流出防止に寄与する。","グリーストラップは、設置後は清掃不要である。"], answer:4, explanation:"グリーストラップは定期的な清掃が不可欠です。清掃を怠ると油脂が蓄積して捕集機能が低下し、排水管の詰まりや悪臭の原因となります。" },
        { id:"5-027", year:2022, text:"給水設備の汚染防止に関する次の記述のうち、最も不適当なものはどれか。", choices:["吐水口空間は、逆流防止の基本的な方法である。","逆止弁は、逆流防止装置の一つである。","バキュームブレーカは、負圧による逆流を防止する装置である。","受水槽のオーバーフロー管は、間接排水とする。","飲料水配管を他の配管系統と直接接続してもよい。"], answer:4, explanation:"飲料水配管を他の配管系統と直接接続すること（クロスコネクション）は、いかなる場合も禁止されています。汚染水が飲料水に混入する危険があるためです。" },
        { id:"5-028", year:2021, text:"し尿浄化槽に関する次の記述のうち、最も不適当なものはどれか。", choices:["浄化槽の処理方式には、嫌気ろ床接触ばっ気方式がある。","浄化槽の放流水のBODは、20mg/L以下とされている。","浄化槽の保守点検は、定期的に実施する必要がある。","浄化槽の法定検査は、設置後の水質検査と定期検査がある。","浄化槽は、下水道が整備された地域でも撤去の必要はない。"], answer:4, explanation:"下水道が供用開始された区域では、原則として一定期間内に下水道に接続し、浄化槽を廃止する義務があります。" },
        { id:"5-029", year:2020, text:"飲料水の消毒に関する次の記述のうち、最も不適当なものはどれか。", choices:["塩素消毒は、最も一般的な飲料水の消毒方法である。","次亜塩素酸ナトリウムは、塩素消毒剤として使用される。","紫外線消毒は、残留効果がない。","オゾン消毒は、強力な酸化力を持つ。","結合残留塩素は、遊離残留塩素より殺菌力が強い。"], answer:4, explanation:"遊離残留塩素の方が結合残留塩素より殺菌力が強いです。遊離残留塩素は次亜塩素酸等の形態で、結合残留塩素はクロラミン等の形態で存在し、遊離型の方が即効性があります。" },
        { id:"5-030", year:2019, text:"排水の阻集器に関する次の記述のうち、最も不適当なものはどれか。", choices:["グリーストラップは、油脂を阻集する装置である。","サンドトラップは、土砂を阻集する装置である。","ヘアキャッチャーは、毛髪を阻集する装置である。","プラスタートラップは、石膏等を阻集する装置である。","阻集器は、設置場所に関係なく同一の構造でよい。"], answer:4, explanation:"阻集器は、阻集する物質の種類（油脂、土砂、毛髪、石膏等）に応じて構造や容量が異なります。設置場所や用途に適した阻集器を選定する必要があります。" }
      ]
    },
    {
      id: 6, name: "清掃", shortName: "清掃",
      questions: [
        { id:"6-001", year:2023, text:"建築物の清掃管理に関する次の記述のうち、最も不適当なものはどれか。", choices:["日常清掃は、建築物の美観と衛生を維持するために毎日行う清掃である。","定期清掃は、日常清掃では除去できない汚れを除去するために行う。","清掃品質の評価には、組織品質、業務品質、結果品質がある。","建築物清掃業の登録には、清掃作業監督者の選任が必要である。","清掃計画は、一度作成すれば見直す必要はない。"], answer:4, explanation:"清掃計画は、建築物の使用状況の変化、汚れの状況、新しい清掃技術の導入等に応じて、定期的に見直す必要があります。一度作成すれば見直し不要ということはありません。" },
        { id:"6-002", year:2023, text:"床材と清掃方法に関する次の記述のうち、最も不適当なものはどれか。", choices:["弾性床材には、塩化ビニルタイル、リノリウム等がある。","硬性床材には、花崗岩、大理石等がある。","繊維床材（カーペット）の清掃には、真空掃除機が有効である。","木質床材には、大量の水を使用した清掃が適している。","樹脂床維持剤（フロアポリッシュ）は、床面の保護と美観向上に使用される。"], answer:3, explanation:"木質床材は水に弱く、大量の水を使用すると膨張・変形・変色の原因となります。木質床材の清掃には、水分を絞ったモップ等による清掃が適しています。" },
        { id:"6-003", year:2022, text:"清掃用機械・器具に関する次の記述のうち、最も不適当なものはどれか。", choices:["床みがき機（ポリッシャー）は、洗浄・研磨・ワックス塗布等に使用される。","自動床洗浄機は、洗浄液の塗布、ブラシ洗浄、汚水回収を自動で行う。","真空掃除機のHEPAフィルタは、微細な粉じんの捕集に有効である。","超高速バフ機は、床面のつや出しに使用される。","ポリッシャーの標準的な回転数は、毎分1,000回転以上である。"], answer:4, explanation:"ポリッシャー（床みがき機）の標準的な回転数は毎分150～300回転程度です。毎分1,000回転以上は超高速バフ機の回転数であり、ポリッシャーの回転数とは大きく異なります。" },
        { id:"6-004", year:2022, text:"洗剤に関する次の記述のうち、最も不適当なものはどれか。", choices:["界面活性剤は、洗剤の主成分である。","酸性洗剤は、尿石やスケールの除去に使用される。","アルカリ性洗剤は、油汚れの除去に適している。","洗剤の希釈濃度を高くするほど、洗浄効果は比例して高くなる。","中性洗剤は、材質を傷めにくく、広範囲に使用できる。"], answer:3, explanation:"洗剤は一定濃度を超えると洗浄効果が頭打ちとなり、濃度に比例して効果が高くなるわけではありません（臨界ミセル濃度）。過度な濃度は、すすぎの負荷増加や材質への悪影響となります。" },
        { id:"6-005", year:2021, text:"廃棄物の処理及び清掃に関する法律（廃棄物処理法）に関する次の記述のうち、最も不適当なものはどれか。", choices:["産業廃棄物の処理責任は、排出事業者にある。","一般廃棄物の処理は、市町村の責務とされている。","マニフェスト制度は、産業廃棄物の適正処理を確認するための制度である。","特別管理産業廃棄物には、感染性廃棄物等が含まれる。","産業廃棄物は、すべて焼却処理しなければならない。"], answer:4, explanation:"産業廃棄物の処理方法は焼却だけではなく、リサイクル、埋立処分、中間処理等の様々な方法があります。廃棄物の種類や性状に応じた適切な方法で処理する必要があります。" },
        { id:"6-006", year:2021, text:"ビルクリーニングにおける作業計画に関する次の記述のうち、最も不適当なものはどれか。", choices:["作業計画には、日常清掃と定期清掃の区分を明確にする。","床の清掃頻度は、歩行頻度や汚れの程度によって決定する。","外装の清掃は、建築物の立地条件や汚れの程度によって頻度を決定する。","作業品質の評価は、作業完了後に目視点検のみで行う。","資機材の選定は、清掃対象の材質や汚れの種類に応じて行う。"], answer:3, explanation:"作業品質の評価は、目視点検だけでなく、光沢度測定やATP測定等の客観的な方法も含めて総合的に行うことが望ましいです。目視点検のみでは不十分です。" },
        { id:"6-007", year:2020, text:"カーペット清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["日常清掃として、真空掃除機による除じんが基本である。","しみ抜きは、しみの種類に応じた溶剤や洗剤を使用する。","エクストラクター方式は、洗剤液の噴射と汚水の吸引を同時に行う。","ドライフォーム方式は、泡状の洗剤を使用し、乾燥時間が短い。","スチーム方式は、低温の蒸気で汚れを溶解させる方法である。"], answer:4, explanation:"スチーム方式は、高温の蒸気（スチーム）を噴射して汚れを溶解・除去する方法です。低温ではなく高温の蒸気を使用します。" },
        { id:"6-008", year:2020, text:"建築物内の廃棄物処理に関する次の記述のうち、最も不適当なものはどれか。", choices:["中間処理には、焼却、破砕、圧縮等の方法がある。","廃棄物の保管場所は、衛生的に管理する必要がある。","事業系一般廃棄物は、事業者が自ら処理する責任がある。","分別収集は、リサイクルの推進に有効である。","建築物内で発生する廃棄物は、すべて一般廃棄物に分類される。"], answer:4, explanation:"建築物内で発生する廃棄物には、一般廃棄物だけでなく産業廃棄物も含まれます。例えば蛍光管（水銀を含む）、廃油、廃プラスチック類等は産業廃棄物に分類されるものがあります。" },
        { id:"6-009", year:2019, text:"床維持剤（フロアフィニッシュ）に関する次の記述のうち、最も不適当なものはどれか。", choices:["水性フロアポリッシュは、乾燥により皮膜を形成する。","フロアオイルは、木質床の保護に使用される。","フロアシーラは、床材への汚れの浸透を防止する目的で使用される。","剥離剤は、古い床維持剤の皮膜を除去するために使用される。","水性フロアポリッシュは、塗布後すぐに歩行しても問題ない。"], answer:4, explanation:"水性フロアポリッシュは、塗布後に十分な乾燥時間が必要です。乾燥が不十分な状態で歩行すると、皮膜が傷んだり、足跡がつく原因となります。通常30分～1時間程度の乾燥時間を設けます。" },
        { id:"6-010", year:2019, text:"外装清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["ゴンドラは、高所の外装清掃に使用される作業用足場である。","ブランコ（ボースンチェア）は、簡易な高所作業用具である。","高所作業には、労働安全衛生法に基づく安全対策が必要である。","自動窓拭き設備は、建築物の設計段階から計画されることが多い。","ガラス清掃にはフッ酸を日常的に使用することが推奨される。"], answer:4, explanation:"フッ酸（フッ化水素酸）は非常に危険な薬品であり、ガラスを溶かす性質があるため日常的なガラス清掃には使用しません。通常のガラス清掃には、スクイジーと中性洗剤を使用します。" },
        { id:"6-011", year:2023, text:"床の汚れに関する次の記述のうち、最も不適当なものはどれか。", choices:["土砂汚れは、靴底により外部から持ち込まれる。","油汚れは、厨房や機械室で多く発生する。","水垢は、トイレや洗面所の床に発生しやすい。","ヒールマークは、靴のゴム底により床面に付く汚れである。","床の汚れは、すべて同じ洗剤で除去できる。"], answer:4, explanation:"床の汚れは種類によって適切な洗剤が異なります。油汚れにはアルカリ性洗剤、水垢には酸性洗剤、一般的な汚れには中性洗剤等、汚れの種類に応じた洗剤の選択が必要です。" },
        { id:"6-012", year:2022, text:"清掃作業の安全管理に関する次の記述のうち、最も不適当なものはどれか。", choices:["洗剤の取り扱いには、安全データシート（SDS）を確認する。","酸性洗剤と塩素系洗剤を混合してはならない。","ポリッシャー作業時には、感電防止のため漏電遮断器を使用する。","高所での窓清掃には、安全帯の着用が必要である。","清掃作業中の安全表示は不要である。"], answer:4, explanation:"清掃作業中は、転倒事故防止のため「清掃中」等の安全表示（注意看板やコーン等）を設置する必要があります。特に床が濡れている場合は重要です。" },
        { id:"6-013", year:2021, text:"トイレの清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["トイレの日常清掃は、衛生管理上重要である。","便器の清掃には、酸性洗剤が尿石除去に有効である。","トイレの床清掃には、他のエリアと同じモップを使用してよい。","消毒は、感染症予防の観点から重要である。","トイレの清掃頻度は、利用者数に応じて決定する。"], answer:2, explanation:"トイレの清掃に使用するモップや清掃用具は、衛生上、他のエリアと区別する必要があります。トイレ専用の用具を使用し、交差汚染を防止します。" },
        { id:"6-014", year:2020, text:"弾性床材の維持管理に関する次の記述のうち、最も不適当なものはどれか。", choices:["塩化ビニルタイルは、弾性床材の代表的な材料である。","樹脂床維持剤（フロアポリッシュ）を塗布して表面を保護する。","剥離作業は、古い床維持剤を除去する作業である。","バフィングは、床面の光沢を回復させる作業である。","剥離剤を使用した後は、すすぎ（リンス）が不要である。"], answer:4, explanation:"剥離剤を使用した後は、床面に剥離剤が残留しないよう、十分なすすぎ（リンス）が必要です。残留すると新しい床維持剤の密着不良の原因となります。" },
        { id:"6-015", year:2019, text:"清掃品質の評価に関する次の記述のうち、最も不適当なものはどれか。", choices:["インスペクション（品質検査）は、清掃品質の維持に重要である。","品質評価には、きれいさの5段階評価等が用いられる。","光沢度計は、床面の光沢を客観的に測定する器具である。","ATP測定は、微生物汚染度の簡易測定法として使用される。","清掃品質は、清掃直後のみ評価すればよい。"], answer:4, explanation:"清掃品質は、清掃直後だけでなく、次の清掃までの間（維持期間中）も評価する必要があります。清掃直後のきれいさだけでなく、汚れにくさや品質の持続性も重要です。" },
        { id:"6-016", year:2023, text:"石材床の清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["大理石は、酸性洗剤に弱い。","花崗岩（御影石）は、大理石より耐酸性がある。","テラゾーは、大理石の砕石をセメントで固めた人造石である。","石材床の日常清掃には、ダストモップが有効である。","大理石の清掃には、酸性洗剤が最適である。"], answer:4, explanation:"大理石の主成分は�ite酸カルシウムであり、酸性洗剤を使用すると表面が溶解・変質します。大理石の清掃には中性洗剤を使用し、酸性洗剤は使用してはなりません。" },
        { id:"6-017", year:2022, text:"建築物内の廃棄物管理に関する次の記述のうち、最も不適当なものはどれか。", choices:["事業系一般廃棄物は、事業者に処理責任がある。","産業廃棄物管理票（マニフェスト）は、産業廃棄物の適正処理を確認するための制度である。","廃棄物の保管場所は、悪臭や衛生害虫の発生を防止する措置が必要である。","分別収集は、リサイクル率の向上に寄与する。","建築物内で発生する蛍光灯は、一般廃棄物として処理してよい。"], answer:4, explanation:"蛍光灯は水銀を含むため、産業廃棄物（水銀使用製品産業廃棄物）として適切に処理する必要があります。一般廃棄物としての処理は不適切です。" },
        { id:"6-018", year:2021, text:"エスカレーターの清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["エスカレーターの清掃は、停止した状態で行う。","ステップ（踏み板）の溝部分に汚れがたまりやすい。","ハンドレール（手すり）の清掃も重要である。","くし板（コム）の汚れは安全性に影響する。","エスカレーターの清掃は年に1回で十分である。"], answer:4, explanation:"エスカレーターは利用頻度が高く、ステップやハンドレールの汚れが目立ちやすいため、日常清掃を含め定期的な清掃が必要です。年1回では不十分です。" },
        { id:"6-019", year:2020, text:"カーペットの汚れに関する次の記述のうち、最も不適当なものはどれか。", choices:["カーペットの汚れの約8割は、乾燥した土砂汚れである。","ウェットクリーニングは、水や洗剤を使用する洗浄方法である。","ドライクリーニングは、水をほとんど使用しない洗浄方法である。","パイル（毛足）が倒れた状態をパイルの復元という。","カーペットの汚れは、使用初期に急速に進行する。"], answer:3, explanation:"パイルが倒れた状態はパイルの「圧縮」や「へたり」といい、倒れたパイルを起こすことを「復元」といいます。パイルが倒れた状態をパイルの復元とは言いません。" },
        { id:"6-020", year:2019, text:"清掃用洗剤の表示に関する次の記述のうち、最も不適当なものはどれか。", choices:["洗剤のpH値は、酸性・中性・アルカリ性の区分に用いられる。","pH6～8のものが中性洗剤に分類される。","洗剤の希釈方法は、製品の使用説明に従う。","家庭用品品質表示法により、成分表示が義務付けられている。","業務用洗剤には、成分表示の義務がない。"], answer:4, explanation:"業務用洗剤も、労働安全衛生法に基づくSDS（安全データシート）による情報提供が義務付けられており、成分に関する情報開示の義務があります。" },
        { id:"6-021", year:2023, text:"ごみ処理設備に関する次の記述のうち、最も不適当なものはどれか。", choices:["ダストシュートは、各階からごみを投入して集積する設備である。","コンパクタは、ごみを圧縮する装置である。","生ごみ処理機は、微生物等により生ごみを分解する装置である。","ごみ集積所は、清掃しやすく換気の良い場所に設ける。","ダストシュートは衛生的であり、現在も積極的に採用されている。"], answer:4, explanation:"ダストシュートは、悪臭や害虫の発生、分別収集の困難さ等の衛生上の問題があるため、現在は新設される建築物ではほとんど採用されていません。" },
        { id:"6-022", year:2022, text:"繊維床材（カーペット）の種類に関する次の記述のうち、最も不適当なものはどれか。", choices:["タフテッドカーペットは、基布にパイル糸を刺し込んだものである。","ウィルトンカーペットは、織り込みにより製造される。","タイルカーペットは、正方形のカーペットタイルである。","ニードルパンチカーペットは、パイルのないカーペットである。","すべてのカーペットは水洗いが可能である。"], answer:4, explanation:"カーペットの種類によって適切な洗浄方法は異なります。ウール素材のカーペット等は水洗いにより縮みや変形が生じることがあり、すべてのカーペットが水洗い可能ではありません。" },
        { id:"6-023", year:2021, text:"ビルクリーニングの契約に関する次の記述のうち、最も不適当なものはどれか。", choices:["仕様書には、清掃の対象範囲、頻度、品質基準等を明記する。","清掃業務の品質管理には、定期的なインスペクションが有効である。","清掃業務委託契約には、業務内容、期間、費用等を明記する。","清掃作業従事者への教育訓練は、品質維持に重要である。","清掃の仕様は一度決めたら変更する必要はない。"], answer:4, explanation:"清掃の仕様は、建築物の使用状況の変化、入居者の増減、汚れの状況等に応じて適宜見直す必要があります。一度決めたら変更不要ということはありません。" },
        { id:"6-024", year:2020, text:"床維持剤の種類に関する次の記述のうち、最も不適当なものはどれか。", choices:["水性フロアポリッシュには、樹脂被膜タイプがある。","乳化性フロアポリッシュは、ワックスを主成分とする。","油性フロアポリッシュは、木質床に使用されることが多い。","フロアシーラは、床材と床維持剤の密着性を高める下地剤である。","すべての床材に同じ床維持剤を使用してよい。"], answer:4, explanation:"床材の種類（弾性床材、硬性床材、木質床材等）によって適切な床維持剤が異なります。床材に適さない床維持剤を使用すると、密着不良や変質の原因となります。" },
        { id:"6-025", year:2019, text:"清掃の組織体制に関する次の記述のうち、最も不適当なものはどれか。", choices:["清掃責任者は、作業員の指導・監督を行う。","清掃作業監督者は、建築物清掃業の登録要件の一つである。","清掃作業従事者には、定期的な研修が必要である。","清掃作業計画は、清掃責任者が策定する。","清掃作業従事者に対する健康管理は不要である。"], answer:4, explanation:"清掃作業従事者に対する健康管理は必要です。作業環境（薬品の取り扱い、粉じん等）に応じた健康管理や、感染症予防等の健康対策が重要です。" },
        { id:"6-026", year:2023, text:"特殊な場所の清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["クリーンルームの清掃は、一般区域より高い清浄度が求められる。","手術室の清掃は、感染防止の観点から特別な配慮が必要である。","厨房の清掃は、食品衛生の観点から毎日行う。","電算室の清掃は、精密機器への影響に配慮する。","地下駐車場は清掃対象外である。"], answer:4, explanation:"地下駐車場も清掃対象です。排気ガスによる汚れ、油汚れ、粉じん等が蓄積するため、定期的な清掃が必要です。また、排水溝やグレーチングの清掃も重要です。" },
        { id:"6-027", year:2022, text:"環境配慮型清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["マイクロファイバークロスは、少ない洗剤で清掃できる。","希釈型洗剤は、廃棄物削減に寄与する。","清掃排水の適正処理は、環境保全上重要である。","省資源・省エネルギーを考慮した清掃が求められている。","環境配慮型清掃では清掃品質は二の次でよい。"], answer:4, explanation:"環境配慮型清掃においても、清掃品質を維持することは基本です。環境への配慮と清掃品質の両立が求められます。" },
        { id:"6-028", year:2021, text:"清掃に関する用語の組合せとして、最も不適当なものはどれか。", choices:["スクイジー ── ガラス清掃用具","ダストモップ ── 除じん用具","スプレーバフ ── 床面光沢回復作業","ドライメンテナンス ── 水を使わない床維持管理","ウェットバキューム ── 乾式掃除機"], answer:4, explanation:"ウェットバキュームは汚水を吸引する湿式吸引機であり、乾式掃除機ではありません。乾式掃除機は通常のバキュームクリーナー（真空掃除機）です。" },
        { id:"6-029", year:2020, text:"金属面の清掃に関する次の記述のうち、最も不適当なものはどれか。", choices:["ステンレスの清掃には、中性洗剤が適している。","真ちゅうの清掃には、専用のクリーナーを使用する。","アルミニウムは、強アルカリ性洗剤で変色することがある。","エレベータのステンレスパネルは、目の方向に沿って拭く。","すべての金属面に塩素系洗剤を使用してよい。"], answer:4, explanation:"塩素系洗剤は金属を腐食させる性質があるため、すべての金属面に使用することは不適切です。特にステンレスやアルミニウム等は塩素により腐食（孔食）が発生することがあります。" },
        { id:"6-030", year:2019, text:"清掃におけるゾーニングに関する次の記述のうち、最も不適当なものはどれか。", choices:["ゾーニングとは、清掃対象を区分けして管理することである。","汚染度に応じたゾーニングにより、交差汚染を防止できる。","トイレは高汚染区域に分類される。","事務室は一般区域に分類される。","すべてのゾーンを同じ清掃用具で清掃してよい。"], answer:4, explanation:"汚染度の異なるゾーン間で同じ清掃用具を使用すると、交差汚染の原因となります。特にトイレ等の高汚染区域と事務室等の一般区域では、清掃用具を区別する必要があります。" }
      ]
    },
    {
      id: 7, name: "ねずみ、昆虫等の防除", shortName: "防除",
      questions: [
        { id:"7-001", year:2023, text:"蚊の生態に関する次の記述のうち、最も適当なものはどれか。", choices:["ヒトスジシマカは、日本では成虫のステージで越冬する。","アカイエカは、主に昼間に吸血活動を行う。","チカイエカは、最初の産卵に吸血を必要としない。","蚊の幼虫（ボウフラ）は、陸上で生活する。","蚊の成虫の寿命は、一般に1年以上である。"], answer:2, explanation:"チカイエカは、最初の産卵には吸血を必要としない性質（無吸血産卵性）を持っています。ヒトスジシマカは卵で越冬し、アカイエカは主に夜間に吸血活動を行います。蚊の幼虫は水中で生活します。" },
        { id:"7-002", year:2023, text:"ゴキブリの防除に関する次の記述のうち、最も不適当なものはどれか。", choices:["チャバネゴキブリは、建築物内で最も普通に見られる種である。","ベイト剤（毒餌）は、ゴキブリの防除に有効な手段である。","粘着トラップは、ゴキブリの生息状況の調査に使用される。","残留噴霧処理は、ゴキブリの通り道や潜み場所に薬剤を噴霧する方法である。","チャバネゴキブリの成虫の体長は、約40mmである。"], answer:4, explanation:"チャバネゴキブリの成虫の体長は約11～15mm程度で、比較的小型です。約40mmはクロゴキブリ等の大型種の体長であり、チャバネゴキブリとしては誤りです。" },
        { id:"7-003", year:2022, text:"殺虫剤に関する次の記述のうち、最も不適当なものはどれか。", choices:["ピレスロイド系殺虫剤は、即効性に優れている。","有機リン系殺虫剤は、コリンエステラーゼを阻害する。","IGR（昆虫成長制御剤）は、昆虫の変態を阻害する。","ULV処理は、少量の薬剤を微細な粒子にして空間に放出する方法である。","殺虫剤への抵抗性は、一度獲得されると永久に維持される。"], answer:4, explanation:"殺虫剤への抵抗性は、薬剤の使用を中止すると、時間の経過とともに低下することがあります。永久に維持されるわけではありません。ただし、抵抗性の発達を防ぐため、薬剤のローテーション使用が推奨されます。" },
        { id:"7-004", year:2022, text:"ねずみの防除に関する次の記述のうち、最も不適当なものはどれか。", choices:["ドブネズミは、地中や下水道等の湿った環境を好む。","クマネズミは、天井裏等の高所を好み、都市のビルで増加している。","ハツカネズミは、体が小さく、わずかな隙間から侵入できる。","防鼠工事として、侵入口の閉塞が最も効果的である。","殺鼠剤は、1回の摂食で致死量に達する急性毒剤のみが使用される。"], answer:4, explanation:"殺鼠剤には、1回の摂食で効果がある急性毒剤と、少量ずつ連続して摂食させる抗凝血性殺鼠剤（慢性毒剤）があります。現在はワルファリン等の抗凝血性殺鼠剤が主流です。" },
        { id:"7-005", year:2021, text:"IPM（総合的有害生物管理）に関する次の記述のうち、最も不適当なものはどれか。", choices:["IPMは、有害生物の発生を予防することを基本とする。","IPMでは、定期的な調査（モニタリング）に基づいて対策を講じる。","IPMでは、環境的対策、物理的対策、化学的対策等を組み合わせる。","IPMの目標は、有害生物を完全にゼロにすることである。","IPMでは、薬剤の使用は必要最小限にとどめる。"], answer:3, explanation:"IPMの目標は、有害生物を許容水準以下に管理することであり、完全にゼロにすることではありません。環境への影響を最小限にしながら、経済的に許容できる水準で管理することを目指します。" },
        { id:"7-006", year:2021, text:"ダニに関する次の記述のうち、最も不適当なものはどれか。", choices:["ヒョウヒダニは、アレルギー疾患の主要な原因である。","ヒョウヒダニは、人のフケや垢等を餌としている。","ツメダニは、他のダニを捕食する。","イエダニは、ネズミに寄生し、人も刺すことがある。","ヒョウヒダニは、人を刺して吸血する。"], answer:4, explanation:"ヒョウヒダニ（チリダニ）は人を刺したり吸血したりしません。ヒョウヒダニの虫体や糞がアレルゲンとなり、気管支喘息やアトピー性皮膚炎等のアレルギー疾患を引き起こします。" },
        { id:"7-007", year:2020, text:"建築物における衛生的環境の確保に関する法律に基づく、ねずみ等の防除に関する次の記述のうち、最も不適当なものはどれか。", choices:["ねずみ等の発生場所、生息場所等の調査を6月以内ごとに1回行う。","調査の結果に基づき、必要な措置を講ずる。","殺そ剤又は殺虫剤を使用する場合は、薬事法に基づく承認を受けたものを用いる。","防除作業は、人の健康に被害を生じないように行う。","防除を行う場合は、まず薬剤による駆除を最優先とする。"], answer:4, explanation:"建築物衛生法では、防除は発生を防止する環境整備（環境的対策）を優先し、薬剤の使用は最小限にとどめることとされています。薬剤による駆除を最優先とするのは誤りです。" },
        { id:"7-008", year:2020, text:"衛生害虫に関する次の記述のうち、最も不適当なものはどれか。", choices:["チョウバエは、排水槽やトイレ等の湿った環境で発生する。","ユスリカは、人を刺さないが、大量発生による不快害虫となる。","シバンムシは、乾燥食品を食害する貯蔵害虫である。","トコジラミ（ナンキンムシ）は、夜間に吸血活動を行う。","ハエ類は感染症の媒介に関与しない。"], answer:4, explanation:"ハエ類は、食中毒菌や赤痢菌等の病原体を機械的に媒介する可能性があり、感染症の媒介に関与します。食品を取り扱う場所では特にハエ類の防除が重要です。" },
        { id:"7-009", year:2019, text:"薬剤の安全管理に関する次の記述のうち、最も不適当なものはどれか。", choices:["殺虫剤の使用に際しては、使用上の注意事項を遵守する。","薬剤の保管は、施錠できる場所に保管する。","薬剤の使用記録を作成・保管する。","残った薬剤は、下水道に流して処分する。","薬剤の取扱者は、適切な保護具を着用する。"], answer:3, explanation:"残った薬剤を下水道に流して処分することは絶対に行ってはなりません。残薬は、産業廃棄物として適切に処理するか、薬剤メーカーの指示に従って処分する必要があります。" },
        { id:"7-010", year:2019, text:"防虫・防鼠構造に関する次の記述のうち、最も不適当なものはどれか。", choices:["建築物の出入口には、エアカーテンや自動ドアを設置する。","排水管の開口部には、防虫網を設置する。","窓には網戸を設置する。","食品保管庫の扉の下部には、隙間を設けて換気を確保する。","配管貫通部の隙間は、適切な材料で閉塞する。"], answer:3, explanation:"食品保管庫の扉の下部に隙間を設けると、ねずみや昆虫が侵入する経路となります。食品保管庫は密閉性を高め、隙間をなくすことが重要です。換気が必要な場合は防虫網付きの換気口を設けます。" },
        { id:"7-011", year:2023, text:"トコジラミ（ナンキンムシ）に関する次の記述のうち、最も不適当なものはどれか。", choices:["トコジラミは、夜行性で夜間に吸血する。","トコジラミは、ベッドの隙間や壁の割れ目等に潜む。","トコジラミの咬傷は、激しいかゆみを伴う。","トコジラミは、近年ホテル等での発生が問題となっている。","トコジラミは、飛翔して移動する。"], answer:4, explanation:"トコジラミは翅（はね）がなく、飛ぶことができません。歩行や、荷物・衣類等に付着して移動（受動的拡散）します。" },
        { id:"7-012", year:2022, text:"シロアリに関する次の記述のうち、最も不適当なものはどれか。", choices:["ヤマトシロアリは、日本で最も一般的なシロアリである。","イエシロアリは、被害が大きく、主に温暖な地域に分布する。","シロアリは、木材のセルロースを食害する。","シロアリの防除には、土壌処理法と木部処理法がある。","シロアリは、アリ（蟻）と同じ分類群に属する。"], answer:4, explanation:"シロアリはゴキブリ目（等翅目）に分類され、ハチ目に属するアリ（蟻）とは全く異なる分類群です。名前に「アリ」とつきますが、系統的に近縁ではありません。" },
        { id:"7-013", year:2021, text:"殺虫剤の施用方法に関する次の記述のうち、最も不適当なものはどれか。", choices:["残留噴霧法は、害虫の通り道に薬剤を噴霧する方法である。","空間噴霧法は、空間に薬剤を噴霧して飛翔害虫を駆除する方法である。","毒餌（ベイト）法は、殺虫成分を含む餌を設置する方法である。","燻蒸法は、薬剤を気化させて密閉空間で害虫を駆除する方法である。","残留噴霧法は、薬剤の効果が噴霧直後のみ持続する。"], answer:4, explanation:"残留噴霧法は、噴霧した薬剤が表面に残留し、その上を害虫が歩行することで効果を発揮します。効果は数週間から数ヶ月持続するため、噴霧直後のみではありません。" },
